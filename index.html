            <span style="color:var(--text-sec);">${Math.round(d.totals.kcal)}</span>
            <span style="color:var(--red);font-weight:600;">+${Math.round(absDeficit)}</span>
          </div>
          <div style="height:120px;display:flex;align-items:flex-end;justify-content:center;gap:1px;width:100%;">
            <div style="width:${bw}px;height:${intakeH}px;background:${intakeColor};border-radius:3px 3px 1px 1px;opacity:0.85;" title="Ingesta ${Math.round(d.totals.kcal)} kcal"></div>
          </div>
          ${dayLabel(d, idx)}
        </div>`;
      }

      // Deficit: intake bar + stacked deficit bar
      const stepsH = (dd.stepsKcal / maxCombined) * 120;
      const gymH = (dd.gymKcal / maxCombined) * 120;
      const baseH = (Math.max(dd.baseDeficit, 0) / maxCombined) * 120;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'24':'44'}px;">
        <div style="display:flex;gap:1px;font-size:${isMonthView?'7':'9'}px;">
          <span style="color:var(--text-sec);">${Math.round(d.totals.kcal)}</span>
          <span style="color:var(--green);font-weight:600;">-${Math.round(absDeficit)}</span>
        </div>
        <div style="height:120px;display:flex;align-items:flex-end;justify-content:center;gap:1px;width:100%;">
          <div style="width:${bw}px;height:${intakeH}px;background:${intakeColor};border-radius:3px 3px 1px 1px;opacity:0.85;" title="Ingesta ${Math.round(d.totals.kcal)} kcal"></div>
          <div style="width:${bw}px;display:flex;flex-direction:column;justify-content:flex-end;">
            ${gymH > 0 ? `<div style="width:${bw}px;height:${gymH}px;background:#10b981;border-radius:3px 3px 0 0;opacity:0.5;" title="Gym ${dd.gymKcal}"></div>` : ''}
            ${stepsH > 0 ? `<div style="width:${bw}px;height:${stepsH}px;background:#F59E0B;opacity:0.5;" title="Pasos ${dd.stepsKcal}"></div>` : ''}
            ${baseH > 0 ? `<div style="width:${bw}px;height:${baseH}px;background:var(--teal);border-radius:0 0 1px 1px;opacity:0.5;" title="Dieta ${Math.round(dd.baseDeficit)}"></div>` : ''}
          </div>
        </div>
        ${dayLabel(d, idx)}
      </div>`;
    }).join('');

    // Target line position
    const targetY = 120 - (tgt.kcal / maxKcal) * 120;

    // Projection
    const weeklyDeficit = Math.abs(totalDeficit) / numDays * 7;
    const weeklyFatLoss = weeklyDeficit / 7700;
    const startWeight = (typeof WEIGHT_LOG !== 'undefined' && WEIGHT_LOG.length > 0) ? WEIGHT_LOG[0].weight : 89;
    const currentWeight = startWeight - fatLost;
    const targetWeight = 75;
    const kgToLose = currentWeight - targetWeight;
    const weeksToGoal = weeklyFatLoss > 0 ? Math.ceil(kgToLose / weeklyFatLoss) : 999;
    const goalDate = new Date();
    goalDate.setDate(goalDate.getDate() + weeksToGoal * 7);
    const goalLabel = goalDate.toLocaleDateString('es-ES', { month:'long', year:'numeric' });

    return `
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <span style="font-size:28px;">📊</span>
          <div>
            <div class="card-title" style="margin-bottom:0;">Informe de Energia</div>
            <div style="font-size:12px;color:var(--text-sec);">${rangeLabel} — ${daysWithData.length} dias con datos</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          ${filterHtml}
          <div style="display:flex;gap:8px;">
            <button onclick="exportInformePDF()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.5px;white-space:nowrap;">
              📄 Exportar PDF
            </button>
            <button onclick="exportInformeCSV()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#6366F1;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.5px;white-space:nowrap;">
              📊 Descargar CSV
            </button>
          </div>
        </div>
        <span id="pdf-status" style="font-size:11px;color:var(--text-sec);margin-top:6px;display:block;"></span>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:14px;">🎯 Resumen</div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
          ${kpiHtml}
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px;">
          <div class="card-title" style="margin-bottom:0;">📈 ${informeShowCombined ? 'Ingesta + Deficit' : informeChartMode === 'intake' ? 'Calorias Diarias' : 'Deficit Calorico'}</div>
          <div style="display:flex;gap:6px;">
            <button class="metric-btn ${informeChartMode==='deficit'&&!informeShowCombined?'active':''}" onclick="toggleInformeChartMode()" style="font-size:11px;padding:4px 10px;" ${informeShowCombined?'disabled':''}>
              ${informeChartMode === 'intake' ? '🔄 Deficit' : '🔄 Ingesta'}
            </button>
            <button class="metric-btn ${informeShowCombined?'active':''}" onclick="toggleInformeCombined()" style="font-size:11px;padding:4px 10px;">
              📊 Dual
            </button>
          </div>
        </div>
        <div style="position:relative;padding:0 4px;">
          <div style="display:flex;gap:2px;align-items:flex-end;">
            ${informeShowCombined ? combinedBars : chartBars}
          </div>
          ${informeChartMode === 'intake' && !informeShowCombined ? `
            <div style="position:absolute;left:0;right:0;top:${targetY + 20}px;border-top:2px dashed var(--teal);opacity:0.5;"></div>
            <div style="position:absolute;right:4px;top:${targetY + 12}px;font-size:9px;color:var(--teal);font-weight:600;">obj ${tgt.kcal}</div>
          ` : ''}
          ${isMonthView ? monthSeparators : ''}
        </div>
        ${informeChartMode === 'deficit' && !informeShowCombined ? `
          <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:10px;color:var(--text-sec);">
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--teal);border-radius:2px;vertical-align:middle;margin-right:3px;"></span>Base</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:#F59E0B;border-radius:2px;vertical-align:middle;margin-right:3px;"></span>Pasos</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:#10b981;border-radius:2px;vertical-align:middle;margin-right:3px;"></span>Gym</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:2px;vertical-align:middle;margin-right:3px;"></span>Superavit</span>
          </div>
        ` : ''}
        ${informeShowCombined ? `
          <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:10px;color:var(--text-sec);">
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--teal);border-radius:2px;vertical-align:middle;margin-right:3px;"></span>Ingesta</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;vertical-align:middle;margin-right:3px;opacity:0.4;"></span>Deficit</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:2px;vertical-align:middle;margin-right:3px;opacity:0.4;"></span>Superavit</span>
          </div>
        ` : ''}
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:14px;">⚡ Balance Energetico Diario</div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-family:inherit;">
            <thead>
              <tr style="background:#F1F5F9;">
                <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">Dia</th>
                <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">Fecha</th>
                <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">Ingesta</th>
                <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">TDEE</th>
                <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">🚶 Pasos</th>
                <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">🏋️ Gym</th>
                <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:700;">Balance</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:14px;">🥗 Macros Promedio Diario</div>
        ${macroHtml}
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:14px;">🎯 Proyeccion</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div style="background:var(--teal-light);border-radius:var(--radius);padding:20px;text-align:center;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);font-weight:700;margin-bottom:6px;">Peso Estimado</div>
            <div style="font-size:28px;font-weight:700;color:var(--teal);">${currentWeight.toFixed(1)} kg</div>
            <div style="font-size:11px;color:var(--text-sec);margin-top:4px;">de 89 kg inicial</div>
          </div>
          <div style="background:var(--green-light);border-radius:var(--radius);padding:20px;text-align:center;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--green);font-weight:700;margin-bottom:6px;">Meta 75 kg</div>
            <div style="font-size:28px;font-weight:700;color:var(--green);">${goalLabel}</div>
            <div style="font-size:11px;color:var(--text-sec);margin-top:4px;">~${weeksToGoal} semanas a ${weeklyFatLoss.toFixed(2)} kg/sem</div>
          </div>
        </div>
      </div>
      ${renderWeightStoryline()}`;
  }

  // ── WEIGHT STORYLINE (INFORMES) ─────────────────────────────────────

  function renderWeightStoryline() {
    if (!WEIGHT_LOG || WEIGHT_LOG.length === 0) return '';
    const sorted = [...WEIGHT_LOG].sort((a, b) => a.date.localeCompare(b.date));
    if (sorted.length < 1) return '';

    const last = sorted[sorted.length - 1];
    const first = sorted[0];
    const totalDiff = last.weight - first.weight;
    const goalW = 75;
    const remaining = last.weight - goalW;

    // Chart
    const chartW = 320, chartH = 120;
    const weights = sorted.map(w => w.weight);
    const bodyFats = sorted.map(w => w.bodyFat).filter(Boolean);
    const minW = Math.min(...weights, goalW) - 2;
    const maxW = Math.max(...weights) + 2;
    const rangeW = maxW - minW || 1;

    const weightLine = sorted.map((w, i) => {
      const x = 30 + (i / Math.max(sorted.length - 1, 1)) * (chartW - 40);
      const y = 10 + ((maxW - w.weight) / rangeW) * (chartH - 20);
      return `${x},${y}`;
    }).join(' ');

    const goalY = 10 + ((maxW - goalW) / rangeW) * (chartH - 20);

    // Body fat line if available
    let fatLine = '';
    const fats = sorted.filter(w => w.bodyFat != null);
    if (fats.length >= 2) {
      const minF = Math.min(...fats.map(f => f.bodyFat)) - 2;
      const maxF = Math.max(...fats.map(f => f.bodyFat)) + 2;
      const rangeF = maxF - minF || 1;
      const fatPoints = fats.map((w, i) => {
        const idx = sorted.indexOf(w);
        const x = 30 + (idx / Math.max(sorted.length - 1, 1)) * (chartW - 40);
        const y = 10 + ((maxF - w.bodyFat) / rangeF) * (chartH - 20);
        return `${x},${y}`;
      }).join(' ');
      fatLine = `<polyline points="${fatPoints}" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" stroke-linejoin="round" opacity="0.6" />`;
    }

    // Y-axis labels every 2kg
    const yLabels = [];
    const yStart = Math.floor(minW / 2) * 2;
    const yEnd = Math.ceil(maxW / 2) * 2;
    for (let v = yStart; v <= yEnd; v += 2) {
      const y = 10 + ((maxW - v) / rangeW) * (chartH - 20);
      if (y >= 2 && y <= chartH - 2) {
        yLabels.push(`<text x="26" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--text-sec)">${v}</text>`);
        yLabels.push(`<line x1="30" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="0.5" opacity="0.4" />`);
      }
    }
    const yLabelsStr = yLabels.join('');

    // Body composition evolution with sparklines
    const bodyCompMetrics = [
      { key: 'bodyFat', label: 'Grasa Corporal', unit: '%', color: '#ef4444', icon: '🔴', goodDir: 'down' },
      { key: 'muscleMass', label: 'Masa Muscular', unit: 'kg', color: 'var(--teal)', icon: '💪', goodDir: 'up' },
      { key: 'skeletalMuscle', label: 'Musculo Esquel.', unit: '%', color: '#10b981', icon: '🦴', goodDir: 'up' },
      { key: 'bodyWater', label: 'Agua Corporal', unit: '%', color: '#3b82f6', icon: '💧', goodDir: 'up' },
      { key: 'subcutFat', label: 'Grasa Subcut.', unit: '%', color: '#f97316', icon: '📉', goodDir: 'down' },
      { key: 'visceralFat', label: 'Grasa Visceral', unit: '', color: '#f59e0b', icon: '⚠️', goodDir: 'down' },
      { key: 'boneMass', label: 'Masa Osea', unit: 'kg', color: '#8b5cf6', icon: '🦴', goodDir: 'up' },
      { key: 'bmr', label: 'BMR', unit: ' kcal', color: '#6366f1', icon: '🔥', goodDir: 'up' },
      { key: 'metabolicAge', label: 'Edad Metabolica', unit: '', color: '#ec4899', icon: '🧬', goodDir: 'down' },
    ];

    function miniSparkline(values, color, w=80, h=24) {
      if (values.length < 2) return '';
      const min = Math.min(...values) * 0.98;
      const max = Math.max(...values) * 1.02;
      const range = max - min || 1;
      const pts = values.map((v, i) => {
        const x = (i / (values.length - 1)) * w;
        const y = h - ((v - min) / range) * h;
        return `${x},${y}`;
      }).join(' ');
      return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;">
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>`;
    }

    const renphoEntries = sorted.filter(w => w.bodyFat != null);
    let compBars = '';
    if (renphoEntries.length >= 1) {
      const latest = renphoEntries[renphoEntries.length - 1];
      const earliest = renphoEntries[0];
      const tiles = bodyCompMetrics.map(m => {
        const vals = renphoEntries.map(e => e[m.key]).filter(v => v != null);
        if (vals.length === 0) return '';
        const current = vals[vals.length - 1];
        const delta = vals.length >= 2 ? current - vals[0] : null;
        const deltaStr = delta !== null ? (delta > 0 ? '+' : '') + delta.toFixed(1) : '';
        const deltaColor = delta === null ? '' : ((m.goodDir === 'down' && delta < 0) || (m.goodDir === 'up' && delta > 0)) ? 'var(--green)' : ((m.goodDir === 'down' && delta > 0) || (m.goodDir === 'up' && delta < 0)) ? 'var(--red)' : 'var(--text-sec)';
        const spark = miniSparkline(vals, m.color);
        return `
          <div style="padding:10px;background:var(--bg);border-radius:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:9px;color:var(--text-sec);text-transform:uppercase;letter-spacing:0.5px;">${m.icon} ${m.label}</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:6px;">
              <span style="font-size:18px;font-weight:700;color:${m.color};">${current}${m.unit}</span>
              ${deltaStr ? `<span style="font-size:11px;font-weight:600;color:${deltaColor};">${deltaStr}</span>` : ''}
            </div>
            ${spark ? `<div style="margin-top:4px;">${spark}</div>` : ''}
          </div>`;
      }).filter(Boolean).join('');

      compBars = `
        <div style="margin-top:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-sec);">Composicion Corporal — Evolucion Renpho</div>
            <div style="font-size:10px;color:var(--text-sec);">${earliest.date} → ${latest.date}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            ${tiles}
          </div>
        </div>`;
    } else {
      compBars = `
        <div style="margin-top:16px;text-align:center;padding:20px;background:var(--bg);border-radius:10px;">
          <div style="font-size:24px;margin-bottom:6px;">📱</div>
          <div style="font-size:12px;font-weight:600;color:var(--text);">Composicion Corporal</div>
          <div style="font-size:11px;color:var(--text-sec);margin-top:4px;">Envia un screenshot de Renpho para trackear grasa, musculo, BMR y mas.</div>
        </div>`;
    }

    return `
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <span style="font-size:24px;">⚖️</span>
          <div>
            <div class="card-title" style="margin-bottom:0;">Evolucion de Peso</div>
            <div style="font-size:12px;color:var(--text-sec);">${sorted.length} registros | Meta: ${goalW} kg</div>
          </div>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:12px;">
          <div style="text-align:center;padding:10px 16px;background:var(--bg);border-radius:8px;flex:1;">
            <div style="font-size:20px;font-weight:700;color:var(--text);">${last.weight} kg</div>
            <div style="font-size:9px;color:var(--text-sec);text-transform:uppercase;">Actual</div>
          </div>
          <div style="text-align:center;padding:10px 16px;background:var(--bg);border-radius:8px;flex:1;">
            <div style="font-size:20px;font-weight:700;color:${totalDiff <= 0 ? 'var(--green)' : 'var(--red)'};">${totalDiff > 0 ? '+' : ''}${totalDiff.toFixed(1)}</div>
            <div style="font-size:9px;color:var(--text-sec);text-transform:uppercase;">Cambio</div>
          </div>
          <div style="text-align:center;padding:10px 16px;background:var(--bg);border-radius:8px;flex:1;">
            <div style="font-size:20px;font-weight:700;color:var(--teal);">${remaining.toFixed(1)}</div>
            <div style="font-size:9px;color:var(--text-sec);text-transform:uppercase;">Falta (kg)</div>
          </div>
        </div>

        <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;height:${chartH}px;">
          ${yLabelsStr}
          <line x1="30" y1="${goalY}" x2="${chartW}" y2="${goalY}" stroke="var(--green)" stroke-width="1" stroke-dasharray="6,3" opacity="0.5" />
          <text x="${chartW - 2}" y="${goalY - 4}" text-anchor="end" font-size="9" fill="var(--green)">${goalW} kg meta</text>
          <polyline points="${weightLine}" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linejoin="round" />
          ${fatLine}
          ${sorted.map((w, i) => {
            const x = 30 + (i / Math.max(sorted.length - 1, 1)) * (chartW - 40);
            const y = 10 + ((maxW - w.weight) / rangeW) * (chartH - 20);
            const dateLabel = new Date(w.date + 'T00:00:00').toLocaleDateString('es-ES', { day:'numeric', month:'short' });
            let deltaLabel = '';
            if (i > 0) {
              const prevX = 30 + ((i - 1) / Math.max(sorted.length - 1, 1)) * (chartW - 40);
              const prevY = 10 + ((maxW - sorted[i - 1].weight) / rangeW) * (chartH - 20);
              const midX = (prevX + x) / 2;
              const midY = (prevY + y) / 2 - 10;
              const diff = (w.weight - sorted[i - 1].weight).toFixed(1);
              const dColor = diff < 0 ? 'var(--green)' : 'var(--red)';
              deltaLabel = `<text x="${midX}" y="${midY}" text-anchor="middle" font-size="10" font-weight="700" fill="${dColor}" font-family="Inter,sans-serif">${diff > 0 ? '+' : ''}${diff}</text>`;
            }
            return `${deltaLabel}<g style="cursor:pointer;">
              <circle cx="${x}" cy="${y}" r="3.5" fill="var(--teal)" stroke="#fff" stroke-width="1" />
              <circle cx="${x}" cy="${y}" r="12" fill="transparent" />
              <title>${dateLabel}: ${w.weight} kg</title>
            </g>`;
          }).join('')}
        </svg>
        <div style="display:flex;font-size:9px;color:var(--text-sec);margin-top:2px;padding-left:30px;">
          ${sorted.map((w, i) => {
            const d = new Date(w.date + 'T00:00:00');
            return `<span style="flex:1;text-align:center;">${d.getDate()}/${d.getMonth()+1}</span>`;
          }).join('')}
        </div>
        ${fats.length >= 2 ? '<div style="text-align:center;font-size:9px;color:#ef4444;margin-top:1px;">- - grasa %</div>' : ''}

        ${compBars}
      </div>`;
  }

  // ── NUTRICION: Food Intelligence ────────────────────────────────────

  let nutriTab = 'comidas'; // comidas | alimentos | correlaciones
  let nutriMealFilter = 'todas'; // todas | desayuno | almuerzo | cena | snack
  let nutriSort = 'score'; // score | kcal | prot

  window.setNutriTab = function(tab) { nutriTab = tab; render(); };
  window.setNutriMealFilter = function(f) { nutriMealFilter = f; render(); };
  window.setNutriSort = function(s) { nutriSort = s; render(); };

  function renderNutricion() {
    const tgt = TARGETS();
    const userMeals = MEAL_LOG.filter(m => !m.who || m.who === currentUser);

    // Score foods
    const scoredFoods = FOOD_DATABASE.filter(f => f.per100g && f.per100g.kcal > 0).map(f => {
      const p = f.per100g;
      const protKcal = p.prot * 4, carbsKcal = p.carbs * 4, fatKcal = p.fat * 9;
      const protRatio = protKcal / p.kcal;
      const tgtProtR = (tgt.prot * 4) / tgt.kcal, tgtCarbR = (tgt.carbs * 4) / tgt.kcal, tgtFatR = (tgt.fat * 9) / tgt.kcal;
      const score = Math.round((protRatio - Math.max(0, (carbsKcal / p.kcal) - tgtCarbR) * 0.5 - Math.max(0, (fatKcal / p.kcal) - tgtFatR) * 0.8) * 100);
      return { ...f, score, kcalPer100: p.kcal };
    }).sort((a, b) => b.score - a.score);

    // Score meals
    const allMealScores = userMeals.filter(m => m.items && m.items.length > 0).map(m => {
      const totalKcal = m.items.reduce((s, i) => s + (i.kcal || 0), 0);
      const totalProt = m.items.reduce((s, i) => s + (i.prot || 0), 0);
      const totalCarbs = m.items.reduce((s, i) => s + (i.carbs || 0), 0);
      const totalFat = m.items.reduce((s, i) => s + (i.fat || 0), 0);
      if (totalKcal === 0) return null;
      const protR = (totalProt * 4) / totalKcal;
      const tgtProtR = (tgt.prot * 4) / tgt.kcal, tgtCarbR = (tgt.carbs * 4) / tgt.kcal, tgtFatR = (tgt.fat * 9) / tgt.kcal;
      const score = Math.round((protR - Math.max(0, (totalCarbs * 4 / totalKcal) - tgtCarbR) * 0.5 - Math.max(0, (totalFat * 9 / totalKcal) - tgtFatR) * 0.8) * 100);
      // Checkmarks: P/kcal>=10%, C/kcal<=7%, F/kcal<=5%
      const pCheck = (totalProt / totalKcal * 100) >= 10;
      const cCheck = (totalCarbs / totalKcal * 100) <= 7;
      const fCheck = (totalFat / totalKcal * 100) <= 5;
      return { ...m, totalKcal, totalProt, totalCarbs, totalFat, score, pCheck, cCheck, fCheck };
    }).filter(Boolean);

    // Apply filters
    let filtered = nutriMealFilter === 'todas' ? allMealScores : allMealScores.filter(m => m.meal === nutriMealFilter);
    // Sort
    if (nutriSort === 'score') filtered.sort((a, b) => b.score - a.score);
    else if (nutriSort === 'kcal') filtered.sort((a, b) => a.totalKcal - b.totalKcal);
    else if (nutriSort === 'prot') filtered.sort((a, b) => b.totalProt - a.totalProt);

    // Sub-tab buttons
    const tabs = `<div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="metric-btn ${nutriTab==='comidas'?'active':''}" onclick="setNutriTab('comidas')">🍽️ Comidas</button>
      <button class="metric-btn ${nutriTab==='alimentos'?'active':''}" onclick="setNutriTab('alimentos')">🧪 Alimentos</button>
      <button class="metric-btn ${nutriTab==='correlaciones'?'active':''}" onclick="setNutriTab('correlaciones')">🔍 Correlaciones</button>
    </div>`;

    // ===== COMIDAS TAB =====
    if (nutriTab === 'comidas') {
      // Meal type summary cards
      const mealTypes = ['desayuno', 'almuerzo', 'cena', 'snack'];
      const mealEmojis = { desayuno: '🌅', almuerzo: '☀️', cena: '🌙', snack: '🍪' };
      const typeSummary = mealTypes.map(type => {
        const meals = allMealScores.filter(m => m.meal === type);
        if (meals.length === 0) return null;
        const avgScore = Math.round(meals.reduce((s, m) => s + m.score, 0) / meals.length);
        const avgKcal = Math.round(meals.reduce((s, m) => s + m.totalKcal, 0) / meals.length);
        const avgProt = round1(meals.reduce((s, m) => s + m.totalProt, 0) / meals.length);
        const best = [...meals].sort((a, b) => b.score - a.score)[0];
        const scoreColor = avgScore >= 50 ? '#059669' : avgScore >= 25 ? '#0D9488' : avgScore >= 0 ? '#F59E0B' : '#EF4444';
        return `<div class="card" style="cursor:pointer;border:2px solid ${nutriMealFilter===type?'var(--teal)':'transparent'};" onclick="setNutriMealFilter('${nutriMealFilter===type?'todas':type}')">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:13px;font-weight:600;">${mealEmojis[type]} ${type.charAt(0).toUpperCase()+type.slice(1)}</span>
            <span style="font-size:18px;font-weight:700;color:${scoreColor};">${avgScore}</span>
          </div>
          <div style="font-size:10px;color:var(--text-sec);">${meals.length} comidas | ~${avgKcal} kcal | ~${avgProt}g prot</div>
        </div>`;
      }).filter(Boolean).join('');

      // Filters + sort
      const filterBar = `<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <span style="font-size:10px;color:var(--text-sec);font-weight:600;">FILTRO:</span>
        ${['todas','desayuno','almuerzo','cena','snack'].map(f =>
          `<button class="metric-btn ${nutriMealFilter===f?'active':''}" onclick="setNutriMealFilter('${f}')" style="font-size:10px;padding:4px 10px;">${f==='todas'?'Todas':f.charAt(0).toUpperCase()+f.slice(1)}</button>`
        ).join('')}
        <span style="margin-left:auto;font-size:10px;color:var(--text-sec);font-weight:600;">ORDEN:</span>
        ${[['score','Score'],['prot','Proteina'],['kcal','- Calorias']].map(([k,l]) =>
          `<button class="metric-btn ${nutriSort===k?'active':''}" onclick="setNutriSort('${k}')" style="font-size:10px;padding:4px 10px;">${l}</button>`
        ).join('')}
      </div>`;

      // Meal cards
      function mealCard(m, rank) {
        const isBest = rank <= 5;
        const isWorst = rank > filtered.length - 5;
        const badge = m.score >= 50 ? '⭐' : m.score >= 30 ? '👍' : m.score >= 0 ? '😐' : '❌';
        const borderColor = m.score >= 50 ? '#059669' : m.score >= 30 ? '#0D9488' : m.score >= 0 ? '#F59E0B' : '#EF4444';
        const scoreColor = borderColor;
        const items = m.items.map(i => `<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid var(--border);">
          <span style="flex:1;">${i.name}</span>
          <span style="color:var(--text-sec);min-width:40px;text-align:right;">${Math.round(i.kcal)}</span>
          <span style="color:#0D9488;min-width:35px;text-align:right;font-weight:500;">${round1(i.prot)}P</span>
        </div>`).join('');
        const d = new Date(m.date + 'T00:00:00');
        const dateLabel = d.toLocaleDateString('es-ES', { day:'numeric', month:'short', weekday:'short' });
        return `<div style="background:var(--card);border:1.5px solid ${borderColor}22;border-radius:12px;padding:12px;border-left:4px solid ${borderColor};">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div>
              <span style="font-size:18px;">${badge}</span>
              <span style="font-size:12px;font-weight:600;text-transform:capitalize;margin-left:4px;">${m.meal}</span>
              <span style="font-size:10px;color:var(--text-sec);margin-left:6px;">${dateLabel}</span>
            </div>
            <div style="text-align:right;">
              <div style="font-size:20px;font-weight:800;color:${scoreColor};line-height:1;">${m.score}</div>
              <div style="font-size:8px;color:var(--text-sec);text-transform:uppercase;">score</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <span style="font-size:11px;font-weight:600;">${Math.round(m.totalKcal)} kcal</span>
            <span style="font-size:11px;color:#0D9488;font-weight:600;">${round1(m.totalProt)}g P</span>
            <span style="font-size:11px;color:var(--text-sec);">${round1(m.totalCarbs)}g C</span>
            <span style="font-size:11px;color:var(--text-sec);">${round1(m.totalFat)}g F</span>
            <span style="margin-left:auto;font-size:10px;">
              <span style="color:${m.pCheck?'#059669':'#EF4444'};">${m.pCheck?'✓':'✗'}P</span>
              <span style="color:${m.cCheck?'#059669':'#EF4444'};">${m.cCheck?'✓':'✗'}C</span>
              <span style="color:${m.fCheck?'#059669':'#EF4444'};">${m.fCheck?'✓':'✗'}F</span>
            </span>
          </div>
          <div>${items}</div>
        </div>`;
      }

      const mealCards = filtered.map((m, i) => mealCard(m, i + 1)).join('');

      return `
        <div class="card" style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <span style="font-size:24px;">🥗</span>
            <div>
              <div class="card-title" style="margin-bottom:0;">Inteligencia Nutricional</div>
              <div style="font-size:11px;color:var(--text-sec);">${allMealScores.length} comidas | ${scoredFoods.length} alimentos</div>
            </div>
          </div>
          ${tabs}
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
          ${typeSummary}
        </div>

        ${filterBar}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${mealCards}
        </div>
      `;
    }

    // ===== ALIMENTOS TAB =====
    if (nutriTab === 'alimentos') {
      const chartW = 600, chartH = 400, pad = 50;
      const maxKcal = Math.min(Math.max(...scoredFoods.map(f => f.kcalPer100)), 900);
      const minScore = Math.min(...scoredFoods.map(f => f.score));
      const maxScore = Math.max(...scoredFoods.map(f => f.score));
      const scoreRange = maxScore - minScore || 1;

      let dots = '';
      scoredFoods.forEach(f => {
        const x = pad + ((f.score - minScore) / scoreRange) * (chartW - pad * 2);
        const y = pad + ((maxKcal - Math.min(f.kcalPer100, maxKcal)) / maxKcal) * (chartH - pad * 2);
        const color = f.score >= 60 ? '#059669' : f.score >= 30 ? '#0D9488' : f.score >= 0 ? '#F59E0B' : '#EF4444';
        const r = f.source === 'recetario' ? 5 : 4;
        const label = f.name.length > 20 ? f.name.slice(0, 18) + '..' : f.name;
        dots += `<circle cx="${x}" cy="${y}" r="${r}" fill="${color}" opacity="0.75" style="cursor:pointer;">
          <title>${f.name}\n${f.kcalPer100} kcal/100g | Densidad: ${f.score}\nP:${f.per100g.prot}g C:${f.per100g.carbs}g F:${f.per100g.fat}g</title>
        </circle>`;
        const rank = scoredFoods.indexOf(f);
        if (rank < 8 || rank >= scoredFoods.length - 4) {
          const anchor = x > chartW / 2 ? 'end' : 'start';
          dots += `<text x="${x + (x > chartW/2 ? -7 : 7)}" y="${y + 3}" text-anchor="${anchor}" font-size="8" fill="${color}" font-weight="500">${label}</text>`;
        }
      });

      const medScore = scoredFoods[Math.floor(scoredFoods.length / 2)].score;
      const medX = pad + ((medScore - minScore) / scoreRange) * (chartW - pad * 2);
      const sortedKcals = scoredFoods.map(f => f.kcalPer100).sort((a,b) => a - b);
      const medKcalVal = sortedKcals[Math.floor(sortedKcals.length / 2)];
      const medY = pad + ((maxKcal - medKcalVal) / maxKcal) * (chartH - pad * 2);

      const quadrantSvg = `<svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;max-width:${chartW}px;height:auto;">
        <rect x="${pad}" y="${pad}" width="${chartW - pad*2}" height="${chartH - pad*2}" fill="var(--bg)" rx="4"/>
        <line x1="${medX}" y1="${pad}" x2="${medX}" y2="${chartH - pad}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>
        <line x1="${pad}" y1="${medY}" x2="${chartW - pad}" y2="${medY}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="${pad + 10}" y="${pad + 15}" font-size="10" fill="#EF4444" font-weight="600" opacity="0.6">EVITAR</text>
        <text x="${chartW - pad - 10}" y="${pad + 15}" text-anchor="end" font-size="10" fill="#F59E0B" font-weight="600" opacity="0.6">DENSO NUTRITIVO</text>
        <text x="${pad + 10}" y="${chartH - pad - 10}" font-size="10" fill="#94A3B8" font-weight="600" opacity="0.6">BAJO VALOR</text>
        <text x="${chartW - pad - 10}" y="${chartH - pad - 10}" text-anchor="end" font-size="10" fill="#059669" font-weight="600" opacity="0.6">IDEAL</text>
        <text x="${12}" y="${chartH/2+3}" text-anchor="middle" font-size="9" fill="var(--text-sec)" transform="rotate(-90,12,${chartH/2})">Calorias /100g</text>
        <text x="${chartW/2}" y="${chartH - 8}" text-anchor="middle" font-size="9" fill="var(--text-sec)">Densidad Nutricional</text>
        <text x="${pad-6}" y="${pad+8}" text-anchor="end" font-size="8" fill="var(--text-sec)">+ kcal</text>
        <text x="${pad-6}" y="${chartH-pad}" text-anchor="end" font-size="8" fill="var(--text-sec)">- kcal</text>
        <text x="${pad}" y="${chartH-pad+16}" text-anchor="start" font-size="8" fill="var(--text-sec)">- Densidad</text>
        <text x="${chartW-pad}" y="${chartH-pad+16}" text-anchor="end" font-size="8" fill="var(--text-sec)">+ Densidad</text>
        ${dots}
      </svg>`;

      const top15 = scoredFoods.slice(0, 15);
      const bottom10 = scoredFoods.slice(-10).reverse();
      function foodRow(f, rank) {
        const color = f.score >= 60 ? '#059669' : f.score >= 30 ? '#0D9488' : f.score >= 0 ? '#F59E0B' : '#EF4444';
        const badge = f.score >= 60 ? '⭐' : f.score >= 30 ? '👍' : f.score >= 0 ? '😐' : '❌';
        return `<tr><td style="font-size:10px;color:var(--text-sec);text-align:center;">${rank}</td>
          <td style="text-align:left;font-size:11px;font-weight:500;">${badge} ${f.name}</td>
          <td style="font-size:10px;">${f.kcalPer100}</td><td style="font-size:10px;color:#0D9488;font-weight:600;">${f.per100g.prot}g</td>
          <td style="font-size:10px;">${f.per100g.carbs}g</td><td style="font-size:10px;">${f.per100g.fat}g</td>
          <td style="font-weight:700;color:${color};">${f.score}</td></tr>`;
      }

      return `
        <div class="card" style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <span style="font-size:24px;">🥗</span>
            <div><div class="card-title" style="margin-bottom:0;">Inteligencia Nutricional</div></div>
          </div>
          ${tabs}
        </div>

        <div class="card" style="margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:6px;">📍 Mapa de Alimentos</div>
          <div style="font-size:10px;color:var(--text-sec);margin-bottom:6px;">Hover para detalle. Derecha = mayor densidad nutricional. Arriba = mas calorico.</div>
          ${quadrantSvg}
          <div style="display:flex;gap:12px;justify-content:center;margin-top:6px;font-size:10px;">
            <span><span style="color:#059669;">●</span> 60+</span><span><span style="color:#0D9488;">●</span> 30-59</span>
            <span><span style="color:#F59E0B;">●</span> 0-29</span><span><span style="color:#EF4444;">●</span> Negativo</span>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div class="card">
            <div class="card-title" style="margin-bottom:6px;color:#059669;">⭐ Top 15</div>
            <table style="width:100%;"><thead><tr><th>#</th><th style="text-align:left;">Alimento</th><th>kcal</th><th>P</th><th>C</th><th>F</th><th>Sc</th></tr></thead>
            <tbody>${top15.map((f, i) => foodRow(f, i + 1)).join('')}</tbody></table>
          </div>
          <div class="card">
            <div class="card-title" style="margin-bottom:6px;color:#EF4444;">❌ Ultimos 10</div>
            <table style="width:100%;"><thead><tr><th>#</th><th style="text-align:left;">Alimento</th><th>kcal</th><th>P</th><th>C</th><th>F</th><th>Sc</th></tr></thead>
            <tbody>${bottom10.map((f, i) => foodRow(f, scoredFoods.length - 9 + i)).join('')}</tbody></table>
          </div>
        </div>
      `;
    }

    // ===== CORRELACIONES TAB =====
    if (nutriTab === 'correlaciones') {
      const foodUsage = {};
      userMeals.forEach(m => {
        if (!m.items) return;
        m.items.forEach(item => {
          if (!foodUsage[item.foodId]) foodUsage[item.foodId] = { name: item.name, dates: new Set() };
          foodUsage[item.foodId].dates.add(m.date);
        });
      });

      const allDates = [...new Set(userMeals.map(m => m.date))];
      const dayTotals = {};
      allDates.forEach(date => {
        const dMeals = userMeals.filter(m => m.date === date);
        const t = { kcal: 0, prot: 0, carbs: 0, fat: 0 };
        dMeals.forEach(m => m.items && m.items.forEach(i => {
          t.kcal += i.kcal || 0; t.prot += i.prot || 0; t.carbs += i.carbs || 0; t.fat += i.fat || 0;
        }));
        dayTotals[date] = t;
      });

      const insights = [];
      Object.entries(foodUsage).forEach(([foodId, info]) => {
        if (info.dates.size < 3) return;
        const withDates = [...info.dates];
        const withoutDates = allDates.filter(d => !info.dates.has(d));
        if (withoutDates.length < 2) return;
        const avg = (dates, key) => dates.reduce((s, d) => s + (dayTotals[d] ? dayTotals[d][key] : 0), 0) / dates.length;
        const kcalDiff = Math.round(avg(withDates, 'kcal') - avg(withoutDates, 'kcal'));
        const protDiff = round1(avg(withDates, 'prot') - avg(withoutDates, 'prot'));
        const fatDiff = round1(avg(withDates, 'fat') - avg(withoutDates, 'fat'));
        const carbsDiff = round1(avg(withDates, 'carbs') - avg(withoutDates, 'carbs'));
        if (Math.abs(kcalDiff) > 50 || Math.abs(protDiff) > 5 || Math.abs(fatDiff) > 3) {
          const impact = (protDiff > 0 ? 1 : -1) + (fatDiff < 0 ? 1 : -1) + (kcalDiff < 0 ? 1 : -1);
          insights.push({ name: info.name, count: info.dates.size, kcalDiff, protDiff, fatDiff, carbsDiff, impact });
        }
      });
      insights.sort((a, b) => b.impact - a.impact || b.count - a.count);

      // Per-meal-type averages
      const mealTypes = ['desayuno', 'almuerzo', 'cena', 'snack'];
      const typeAvgs = mealTypes.map(type => {
        const meals = allMealScores.filter(m => m.meal === type);
        if (meals.length === 0) return null;
        return {
          type,
          count: meals.length,
          avgKcal: Math.round(meals.reduce((s, m) => s + m.totalKcal, 0) / meals.length),
          avgProt: round1(meals.reduce((s, m) => s + m.totalProt, 0) / meals.length),
          avgCarbs: round1(meals.reduce((s, m) => s + m.totalCarbs, 0) / meals.length),
          avgFat: round1(meals.reduce((s, m) => s + m.totalFat, 0) / meals.length),
          avgScore: Math.round(meals.reduce((s, m) => s + m.score, 0) / meals.length),
        };
      }).filter(Boolean);

      const insightCards = insights.slice(0, 20).map(ins => {
        const verdict = ins.impact >= 2 ? '🟢' : ins.impact >= 0 ? '🟡' : '🔴';
        const kcC = ins.kcalDiff < -50 ? '#059669' : ins.kcalDiff > 50 ? '#EF4444' : 'var(--text-sec)';
        const prC = ins.protDiff > 5 ? '#059669' : ins.protDiff < -5 ? '#EF4444' : 'var(--text-sec)';
        const ftC = ins.fatDiff < -3 ? '#059669' : ins.fatDiff > 3 ? '#EF4444' : 'var(--text-sec)';
        return `<tr>
          <td style="text-align:left;font-size:11px;font-weight:500;">${verdict} ${ins.name}</td>
          <td style="font-size:10px;">${ins.count}d</td>
          <td style="color:${kcC};font-weight:600;">${ins.kcalDiff > 0 ? '+' : ''}${ins.kcalDiff}</td>
          <td style="color:${prC};font-weight:600;">${ins.protDiff > 0 ? '+' : ''}${ins.protDiff}g</td>
          <td style="color:${ftC};font-weight:600;">${ins.fatDiff > 0 ? '+' : ''}${ins.fatDiff}g</td>
        </tr>`;
      }).join('');

      return `
        <div class="card" style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <span style="font-size:24px;">🥗</span>
            <div><div class="card-title" style="margin-bottom:0;">Inteligencia Nutricional</div></div>
          </div>
          ${tabs}
        </div>

        <div class="card" style="margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:8px;">📊 Promedios por Tipo de Comida</div>
          <table style="width:100%;">
            <thead><tr><th style="text-align:left;">Tipo</th><th>N</th><th>kcal</th><th>Prot</th><th>Carbs</th><th>Fat</th><th>Score</th></tr></thead>
            <tbody>${typeAvgs.map(t => {
              const sc = t.avgScore >= 50 ? '#059669' : t.avgScore >= 25 ? '#0D9488' : '#F59E0B';
              return `<tr>
                <td style="text-align:left;font-size:11px;font-weight:600;text-transform:capitalize;">${t.type}</td>
                <td style="font-size:10px;">${t.count}</td><td style="font-size:11px;">${t.avgKcal}</td>
                <td style="font-size:11px;color:#0D9488;font-weight:600;">${t.avgProt}g</td>
                <td style="font-size:11px;">${t.avgCarbs}g</td><td style="font-size:11px;">${t.avgFat}g</td>
                <td style="font-weight:700;color:${sc};">${t.avgScore}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>

        <div class="card" style="margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:6px;">🔍 Cuando comes X, que pasa con tu dia?</div>
          <div style="font-size:10px;color:var(--text-sec);margin-bottom:8px;">Diferencia promedio en dias con vs sin ese alimento. 🟢 = impacto positivo, 🔴 = negativo. Min 3 apariciones.</div>
          <table style="width:100%;">
            <thead><tr><th style="text-align:left;">Alimento</th><th>Freq</th><th>kcal/dia</th><th>Prot/dia</th><th>Fat/dia</th></tr></thead>
            <tbody>${insightCards}</tbody>
          </table>
        </div>
      `;
    }

    return '';
  }

  // ── TOOLS: OCR + METABOLIC CALC ─────────────────────────────────────

  let ocrResult = null;
  let ocrProcessing = false;
  let tesseractLoaded = false;

  function loadTesseract() {
    if (tesseractLoaded) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
      s.onload = () => { tesseractLoaded = true; resolve(); };
      s.onerror = () => reject(new Error('No se pudo cargar Tesseract.js'));
      document.head.appendChild(s);
    });
  }

  // Saved metabolic profile (localStorage)
  function getMetaProfile() {
    try { return JSON.parse(localStorage.getItem('nutria_meta_' + currentUser) || 'null'); } catch { return null; }
  }
  function saveMetaProfile(p) {
    localStorage.setItem('nutria_meta_' + currentUser, JSON.stringify(p));
  }

  window.processOCR = async function(file) {
    if (!file || ocrProcessing) return;
    ocrProcessing = true;
    ocrResult = null;
    render();

    try {
      await loadTesseract();
      const { data: { text } } = await Tesseract.recognize(file, 'eng+fra', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round((m.progress || 0) * 100);
            const el = document.getElementById('ocr-progress');
            if (el) el.textContent = pct + '%';
          }
        }
      });
      ocrResult = text;
    } catch (e) {
      ocrResult = 'Error OCR: ' + e.message;
    }
    ocrProcessing = false;
    render();
    // Auto-parse after OCR
    setTimeout(() => { if (ocrResult) parseOCRData(ocrResult); }, 100);
  };

  function parseOCRData(text) {
    const lines = text.replace(/,/g, '').split('\n').map(l => l.trim()).filter(Boolean);
    const result = { steps: null, stepsKcal: null, distance: null, duration: null, gymKcal: null, heartRate: null };

    for (const line of lines) {
      const lower = line.toLowerCase();
      // Steps
      const stepsMatch = line.match(/(\d[\d\s.]*)\s*(steps|pas|pasos|schritt)/i) || line.match(/(steps|pas|pasos)\s*[:\s]*(\d[\d\s.]*)/i);
      if (stepsMatch) {
        const num = parseInt((stepsMatch[1] || stepsMatch[2]).replace(/[\s.]/g, ''));
        if (num > 100 && num < 200000) result.steps = num;
      }
      // Calories (active/total)
      const calMatch = line.match(/(\d[\d\s.]*)\s*(kcal|cal|calories|calorias|kilocalories)/i) || line.match(/(active.*?|total.*?)(\d[\d\s.]*)\s*(kcal|cal)/i);
      if (calMatch) {
        const num = parseInt((calMatch[1] || calMatch[2]).replace(/[\s.]/g, ''));
        if (num > 10 && num < 5000) {
          if (lower.includes('active') || lower.includes('activ') || lower.includes('exerc') || lower.includes('training') || lower.includes('workout')) {
            result.gymKcal = num;
          } else {
            result.stepsKcal = num;
          }
        }
      }
      // Distance
      const distMatch = line.match(/(\d+[.,]\d+)\s*(km|mi)/i);
      if (distMatch) result.distance = distMatch[1].replace(',', '.') + ' ' + distMatch[2];
      // Duration
      const durMatch = line.match(/(\d+)\s*[h:]\s*(\d+)\s*(min|m|')?/i);
      if (durMatch && (lower.includes('dur') || lower.includes('time') || lower.includes('temps'))) {
        result.duration = durMatch[1] + 'h' + durMatch[2] + 'min';
      }
      // Heart rate
      const hrMatch = line.match(/(\d{2,3})\s*(bpm|ppm)/i);
      if (hrMatch) result.heartRate = parseInt(hrMatch[1]);
      // Simple big number on line alone (likely steps if >1000)
      const bigNum = line.match(/^[\s]*(\d{4,6})[\s]*$/);
      if (bigNum && !result.steps) {
        const n = parseInt(bigNum[1]);
        if (n > 1000 && n < 200000) result.steps = n;
      }
    }

    // Display parsed data
    const el = document.getElementById('ocr-parsed');
    if (el) {
      const items = [];
      if (result.steps) items.push(`🚶 ${result.steps.toLocaleString()} pasos`);
      if (result.stepsKcal) items.push(`🔥 ${result.stepsKcal} kcal (pasos)`);
      if (result.gymKcal) items.push(`💪 ${result.gymKcal} kcal (ejercicio)`);
      if (result.distance) items.push(`📏 ${result.distance}`);
      if (result.duration) items.push(`⏱️ ${result.duration}`);
      if (result.heartRate) items.push(`❤️ ${result.heartRate} bpm`);
      el.innerHTML = items.length > 0
        ? `<div style="font-weight:600;margin-bottom:6px;color:var(--teal);">Datos detectados:</div>` +
          items.map(i => `<div style="padding:4px 0;font-size:14px;">${i}</div>`).join('') +
          `<button onclick="applyOCRData(${result.steps||0},${result.stepsKcal||0},${result.gymKcal||0})" style="margin-top:12px;padding:8px 20px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Guardar actividad</button>`
        : '<div style="color:var(--text-sec);">No se detectaron datos de actividad. Revisa el texto OCR debajo.</div>';
    }
  }

  window.applyOCRData = function(steps, stepsKcal, gymKcal) {
    const dateEl = document.getElementById('ocr-date');
    const dateStr = dateEl ? dateEl.value : currentDate;
    const finalStepsKcal = stepsKcal || (steps ? Math.round(steps * 0.03) : 0);

    // Update in-memory ACTIVITY_LOG
    let found = false;
    for (let i = 0; i < ACTIVITY_LOG.length; i++) {
      if (ACTIVITY_LOG[i].date === dateStr) {
        if (steps) { ACTIVITY_LOG[i].steps = steps; ACTIVITY_LOG[i].stepsKcal = finalStepsKcal; }
        if (gymKcal) { ACTIVITY_LOG[i].gymKcal = gymKcal; ACTIVITY_LOG[i].gym = 'gym'; }
        found = true;
        break;
      }
    }
    if (!found) {
      ACTIVITY_LOG.push({
        date: dateStr, steps: steps || 0, stepsKcal: finalStepsKcal,
        gym: gymKcal ? 'gym' : null, gymKcal: gymKcal || 0, notes: 'OCR import'
      });
    }
    // Update in-memory DAILY_BALANCE
    for (let i = 0; i < DAILY_BALANCE.length; i++) {
      if (DAILY_BALANCE[i].date === dateStr) {
        if (steps) DAILY_BALANCE[i].stepsKcal = finalStepsKcal;
        if (gymKcal) DAILY_BALANCE[i].gymKcal = gymKcal;
        DAILY_BALANCE[i].balance = DAILY_BALANCE[i].intake - DAILY_BALANCE[i].tdee - DAILY_BALANCE[i].stepsKcal - DAILY_BALANCE[i].gymKcal;
        break;
      }
    }
    // Persist to server (nutrition-data.js)
    fetch('/api/activity', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date: dateStr, steps: steps || 0, stepsKcal: finalStepsKcal,
        gym: gymKcal ? 'gym' : null, gymKcal: gymKcal || 0, notes: 'OCR import'
      })
    }).then(r => r.json()).then(d => {
      if (d.ok) showToast(`Guardado en ${dateStr}: ${steps ? steps.toLocaleString() + ' pasos' : ''}${gymKcal ? ' + ' + gymKcal + ' kcal gym' : ''}`);
      else showToast('Error guardando actividad');
    }).catch(() => showToast('Guardado local (server offline)'));
    render();
  };

  // ── WEIGHT / RENPHO OCR ──────────────────────────────────────────────

  let renphoResult = null;
  let renphoProcessing = false;

  window.processRenphoOCR = async function(file) {
    if (!file || renphoProcessing) return;
    renphoProcessing = true;
    renphoResult = null;
    render();

    try {
      await loadTesseract();
      const { data: { text } } = await Tesseract.recognize(file, 'eng+fra+spa', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round((m.progress || 0) * 100);
            const el = document.getElementById('renpho-progress');
            if (el) el.textContent = pct + '%';
          }
        }
      });
      renphoResult = text;
    } catch (e) {
      renphoResult = 'Error OCR: ' + e.message;
    }
    renphoProcessing = false;
    render();
    setTimeout(() => { if (renphoResult) parseRenphoData(renphoResult); }, 100);
  };

  function parseRenphoData(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const allText = lines.join(' ');
    const data = {};

    // Helper: find number near a keyword
    function findMetric(keywords, min, max, unit) {
      for (const line of lines) {
        const lower = line.toLowerCase().replace(/[éèê]/g, 'e').replace(/[àâ]/g, 'a');
        for (const kw of keywords) {
          if (lower.includes(kw)) {
            const nums = line.match(/(\d+[.,]\d+|\d+)/g);
            if (nums) {
              for (const n of nums) {
                const val = parseFloat(n.replace(',', '.'));
                if (val >= min && val <= max) return val;
              }
            }
          }
        }
      }
      // Fallback: scan all text
      return null;
    }

    data.weight = findMetric(['weight', 'poids', 'peso', 'body weight'], 30, 250);
    data.bmi = findMetric(['bmi', 'imc'], 10, 60);
    data.bodyFat = findMetric(['body fat', 'grasa corporal', 'graisse corporelle', 'taux de graisse', 'fat %', 'body fat %'], 3, 60);
    data.fatFreeWeight = findMetric(['fat-free', 'fat free', 'masse maigre', 'masa magra', 'lean'], 20, 150);
    data.subcutFat = findMetric(['subcutaneous', 'sous-cutan', 'subcutan', 'grasa subcutan'], 1, 50);
    data.visceralFat = findMetric(['visceral', 'graisse visc'], 1, 30);
    data.bodyWater = findMetric(['body water', 'eau corporelle', 'agua corporal', 'water %'], 20, 80);
    data.skeletalMuscle = findMetric(['skeletal muscle', 'muscle squelettique', 'musculo esqueletico'], 10, 60);
    data.muscleMass = findMetric(['muscle mass', 'masse musculaire', 'masa muscular'], 20, 120);
    data.boneMass = findMetric(['bone mass', 'masse osseuse', 'masa osea'], 1, 10);
    data.bmr = findMetric(['bmr', 'basal', 'metabolismo basal', 'metabolisme'], 800, 3500);
    data.metabolicAge = findMetric(['metabolic age', 'age metabolique', 'edad metabolica'], 10, 90);

    // If no weight found via keywords, look for a standalone number between 50-150 (likely kg)
    if (!data.weight) {
      for (const line of lines) {
        const m = line.match(/^[\s]*(\d{2,3}[.,]\d{1,2})\s*(kg)?[\s]*$/i);
        if (m) {
          const v = parseFloat(m[1].replace(',', '.'));
          if (v >= 40 && v <= 200) { data.weight = v; break; }
        }
      }
    }

    const el = document.getElementById('renpho-parsed');
    if (el) {
      const fields = [
        { key: 'weight', label: 'Peso', unit: 'kg', icon: '⚖️' },
        { key: 'bmi', label: 'IMC', unit: '', icon: '📊' },
        { key: 'bodyFat', label: 'Grasa Corporal', unit: '%', icon: '🔴' },
        { key: 'fatFreeWeight', label: 'Masa Magra', unit: 'kg', icon: '💪' },
        { key: 'subcutFat', label: 'Grasa Subcutanea', unit: '%', icon: '📉' },
        { key: 'visceralFat', label: 'Grasa Visceral', unit: '', icon: '🫀' },
        { key: 'bodyWater', label: 'Agua Corporal', unit: '%', icon: '💧' },
        { key: 'skeletalMuscle', label: 'Musculo Esqueletico', unit: '%', icon: '🦴' },
        { key: 'muscleMass', label: 'Masa Muscular', unit: 'kg', icon: '💪' },
        { key: 'boneMass', label: 'Masa Osea', unit: 'kg', icon: '🦴' },
        { key: 'bmr', label: 'BMR', unit: 'kcal', icon: '🔥' },
        { key: 'metabolicAge', label: 'Edad Metabolica', unit: 'anos', icon: '🎂' },
      ];

      const detected = fields.filter(f => data[f.key] != null);
      const inputRows = fields.map(f => `
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
          <span style="font-size:14px;">${f.icon}</span>
          <span style="font-size:12px;color:var(--text-sec);width:120px;">${f.label}</span>
          <input id="renpho-${f.key}" type="number" step="0.1" value="${data[f.key] || ''}" placeholder="-" style="width:80px;padding:6px 8px;border:1px solid ${data[f.key] ? 'var(--teal)' : 'var(--border)'};border-radius:6px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);text-align:right;">
          <span style="font-size:11px;color:var(--text-sec);width:30px;">${f.unit}</span>
        </div>
      `).join('');

      el.innerHTML = `
        <div style="font-weight:600;margin-bottom:8px;color:var(--teal);font-size:13px;">${detected.length} metricas detectadas. Corrige si es necesario:</div>
        ${inputRows}
        <button onclick="saveRenphoEntry()" style="margin-top:12px;width:100%;padding:10px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Guardar en historial</button>
      `;
    }
  }

  window.saveRenphoEntry = function() {
    const dateEl = document.getElementById('renpho-date');
    const dateStr = dateEl ? dateEl.value : currentDate;
    const entry = { date: dateStr, source: 'renpho-ocr' };
    const keys = ['weight','bmi','bodyFat','fatFreeWeight','subcutFat','visceralFat','bodyWater','skeletalMuscle','muscleMass','boneMass','bmr','metabolicAge'];
    keys.forEach(k => {
      const el = document.getElementById('renpho-' + k);
      if (el && el.value) entry[k] = parseFloat(el.value);
      else entry[k] = null;
    });
    if (!entry.weight) { showToast('Peso es obligatorio'); return; }

    // Calculate BMI if missing
    if (!entry.bmi && entry.weight) {
      const h = 1.75; // Ernesto height in meters
      entry.bmi = Math.round(entry.weight / (h * h) * 10) / 10;
    }

    // Update or add to WEIGHT_LOG
    const idx = WEIGHT_LOG.findIndex(w => w.date === currentDate);
    if (idx >= 0) {
      WEIGHT_LOG[idx] = entry;
    } else {
      WEIGHT_LOG.push(entry);
      WEIGHT_LOG.sort((a, b) => a.date.localeCompare(b.date));
    }

    // Update metabolic calculator profile weight
    const meta = getMetaProfile();
    if (meta) { meta.weight = entry.weight; saveMetaProfile(meta); }

    // Persist to server
    fetch('/api/weight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    }).then(r => r.json()).then(d => {
      if (d.ok) showToast(`Peso guardado (${dateStr}): ${entry.weight} kg` + (entry.bodyFat ? ` | ${entry.bodyFat}% grasa` : ''));
      else showToast('Error guardando peso');
    }).catch(() => showToast('Guardado local (server offline)'));
    renphoResult = null;
    render();
  };

  window.saveManualWeight = function() {
    const w = parseFloat(document.getElementById('manual-weight').value);
    if (!w || w < 30 || w > 300) { showToast('Peso invalido'); return; }
    const dateEl = document.getElementById('renpho-date');
    const dateStr = dateEl ? dateEl.value : currentDate;

    const entry = {
      date: dateStr,
      weight: w,
      bmi: Math.round(w / (1.75 * 1.75) * 10) / 10,
      bodyFat: null, fatFreeWeight: null, subcutFat: null, visceralFat: null,
      bodyWater: null, skeletalMuscle: null, muscleMass: null, boneMass: null,
      bmr: null, metabolicAge: null,
      source: 'manual'
    };

    const idx = WEIGHT_LOG.findIndex(e => e.date === dateStr);
    if (idx >= 0) WEIGHT_LOG[idx] = entry;
    else { WEIGHT_LOG.push(entry); WEIGHT_LOG.sort((a, b) => a.date.localeCompare(b.date)); }

    fetch('/api/weight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    }).then(r => r.json()).then(d => {
      if (d.ok) showToast(`Peso guardado (${dateStr}): ${w} kg (IMC ${entry.bmi})`);
    }).catch(() => showToast('Guardado local (server offline)'));
    render();
  };

  function renderWeightHistory() {
    if (WEIGHT_LOG.length === 0) return '';
    const sorted = [...WEIGHT_LOG].sort((a, b) => a.date.localeCompare(b.date));
    const last = sorted[sorted.length - 1];
    const first = sorted[0];
    const diff = last.weight - first.weight;
    const diffSign = diff > 0 ? '+' : '';

    // Mini chart (SVG)
    const chartW = 280, chartH = 80, padL = 0, padR = 0;
    const weights = sorted.map(w => w.weight);
    const minW = Math.min(...weights) - 1;
    const maxW = Math.max(...weights) + 1;
    const rangeW = maxW - minW || 1;
    const points = sorted.map((w, i) => {
      const x = padL + (i / Math.max(sorted.length - 1, 1)) * (chartW - padL - padR);
      const y = chartH - ((w.weight - minW) / rangeW) * (chartH - 10) - 5;
      return `${x},${y}`;
    }).join(' ');

    return `
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">⚖️ Peso & Composicion</div>
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px;">
        <span style="font-size:28px;font-weight:700;color:var(--text);">${last.weight} kg</span>
        <span style="font-size:14px;font-weight:600;color:${diff <= 0 ? 'var(--green)' : 'var(--red)'};">${diffSign}${diff.toFixed(1)} kg</span>
        <span style="font-size:11px;color:var(--text-sec);">desde ${first.date}</span>
      </div>
      ${last.bodyFat ? `<div style="font-size:12px;color:var(--text-sec);margin-bottom:4px;">Grasa: ${last.bodyFat}% | IMC: ${last.bmi || '-'} | Musculo: ${last.muscleMass || '-'} kg</div>` : `<div style="font-size:12px;color:var(--text-sec);margin-bottom:4px;">IMC: ${last.bmi || '-'}</div>`}
      <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;height:${chartH}px;margin:8px 0;">
        <polyline points="${points}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round" />
        ${sorted.map((w, i) => {
          const x = padL + (i / Math.max(sorted.length - 1, 1)) * (chartW - padL - padR);
          const y = chartH - ((w.weight - minW) / rangeW) * (chartH - 10) - 5;
          return `<circle cx="${x}" cy="${y}" r="3" fill="var(--teal)" />`;
        }).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-sec);">
        <span>${first.date}</span><span>${last.date}</span>
      </div>
    </div>`;
  }

  function renderWeightTable() {
    if (WEIGHT_LOG.length <= 1) return '';
    const sorted = [...WEIGHT_LOG].sort((a, b) => b.date.localeCompare(a.date));
    const rows = sorted.map((w, i) => {
      const prev = sorted[i + 1];
      const diff = prev ? w.weight - prev.weight : 0;
      const diffStr = prev ? (diff > 0 ? '+' : '') + diff.toFixed(1) : '-';
      const diffColor = !prev ? 'var(--text-sec)' : diff <= 0 ? 'var(--green)' : 'var(--red)';
      return `<tr>
        <td style="padding:4px 6px;font-size:12px;">${w.date}</td>
        <td style="padding:4px 6px;font-size:12px;font-weight:600;">${w.weight}</td>

  window.calcMetabolism = function() {
    const age = parseInt(document.getElementById('meta-age').value) || 0;
    const weight = parseFloat(document.getElementById('meta-weight').value) || 0;
    const height = parseFloat(document.getElementById('meta-height').value) || 0;
    const sex = document.getElementById('meta-sex').value;
    const activity = parseFloat(document.getElementById('meta-activity').value) || 1.2;
    const goal = document.getElementById('meta-goal').value;

    if (!age || !weight || !height) return;

    // Mifflin-St Jeor
    let bmr;
    if (sex === 'M') {
      bmr = 10 * weight + 6.25 * height - 5 * age + 5;
    } else {
      bmr = 10 * weight + 6.25 * height - 5 * age - 161;
    }

    const tdee = bmr * activity;

    // Goal adjustments
    let targetKcal, protGkg, note;
    if (goal === 'cut') {
      targetKcal = tdee - 500;
      protGkg = 2.0;
      note = 'Deficit de 500 kcal/dia (~0.45 kg/semana)';
    } else if (goal === 'aggro') {
      targetKcal = tdee - 750;
      protGkg = 2.2;
      note = 'Deficit agresivo de 750 kcal/dia (~0.7 kg/semana). Riesgo de perder musculo si no entrenas.';
    } else if (goal === 'bulk') {
      targetKcal = tdee + 300;
      protGkg = 1.8;
      note = 'Superavit de 300 kcal/dia para ganar masa';
    } else {
      targetKcal = tdee;
      protGkg = 1.6;
      note = 'Mantenimiento';
    }

    const prot = Math.round(weight * protGkg);
    const fat = Math.round(weight * 0.8);
    const protKcal = prot * 4;
    const fatKcal = fat * 9;
    const carbsKcal = targetKcal - protKcal - fatKcal;
    const carbs = Math.max(50, Math.round(carbsKcal / 4));

    // Save profile
    saveMetaProfile({ age, weight, height, sex, activity, goal, bmr: Math.round(bmr), tdee: Math.round(tdee) });

    const el = document.getElementById('meta-results');
    if (el) {
      el.innerHTML = `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:16px;">

              <div style="font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:600;">BMR (kcal)</div>
            </div>
            <div style="text-align:center;padding:12px;background:var(--bg);border-radius:8px;">
              <div style="font-size:24px;font-weight:700;color:var(--teal);">${Math.round(tdee)}</div>
              <div style="font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;font-weight:600;">TDEE (kcal)</div>
            </div>
          </div>
          <div style="font-size:12px;color:var(--text-sec);margin-bottom:12px;font-style:italic;">${note}</div>
          <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;">Macros recomendados</div>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">

            <tr><td style="padding:5px 8px;">Calorias</td><td style="padding:5px 8px;text-align:right;font-weight:600;">${Math.round(targetKcal)} kcal</td><td style="padding:5px 8px;text-align:right;">-</td></tr>
            <tr style="background:var(--bg);"><td style="padding:5px 8px;">Proteina</td><td style="padding:5px 8px;text-align:right;font-weight:600;">${prot} g</td><td style="padding:5px 8px;text-align:right;">${protGkg}</td></tr>
