<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦦 NutrIA — Nutrition Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D9488" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #0D9488;
      --teal-light: #CCFBF1;
      --teal-mid:  #5EEAD4;
      --green:     #059669;
      --green-light: #D1FAE5;
      --red:       #EF4444;
      --red-light: #FEE2E2;
      --yellow:    #F59E0B;
      --yellow-light: #FEF3C7;
      --bg:        #F8FAFC;
      --card:      #FFFFFF;
      --text:      #1E293B;
      --text-sec:  #64748B;
      --border:    #E2E8F0;
      --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      --radius:    12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 48px;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .brand { display: flex; flex-direction: column; }
    .brand-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--teal);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .brand-sub {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: var(--text-sec);
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .nav-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
    .date-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .date-label:hover { border-color: var(--teal); color: var(--teal); }
    .period-pills {
      display: flex;
      gap: 4px;
      padding-bottom: 0;
    }
    .pill {
      padding: 8px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      background: none;
      color: var(--text-sec);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all .15s;
      border-radius: 0;
      white-space: nowrap;
    }
    .pill:hover { color: var(--teal); }
    .pill.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* ── MAIN ── */
    .main {
      max-width: 900px;
      margin: 32px auto 0;
      padding: 0 24px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-sec);
      margin-bottom: 20px;
    }

    /* ── PROGRESS RINGS ── */
    .rings-section {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .rings-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      flex: 1;
    }
    .ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 80px;
      position: relative;
    }
    .ring-excess {
      position: absolute;
      top: 2px;
      right: -6px;
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--red, #e74c3c);
      background: rgba(231,76,60,0.1);
      padding: 1px 4px;
      border-radius: 6px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .ring-svg-container {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 7; }
    .ring-fg {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .ring-val {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .ring-target {
      font-size: 0.6rem;
      color: var(--text-sec);
      margin-top: 1px;
    }
    .ring-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .health-badge {
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .health-badge.green { background: var(--green-light); color: var(--green); }
    .health-badge.yellow { background: var(--yellow-light); color: var(--yellow); }
    .health-badge.red { background: var(--red-light); color: var(--red); }
    .health-badge.orange { background: #FFF7ED; color: #EA580C; }

    /* ── USER SWITCHER ── */
    .user-switcher { display: flex; gap: 6px; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: 2px solid var(--border); color: var(--text-sec);
      background: var(--bg); transition: all .2s;
    }
    .user-avatar:hover { border-color: var(--teal); color: var(--teal); }
    .user-avatar.active { background: var(--teal); color: #fff; border-color: var(--teal); }

    /* ── TARGETS BUTTON & MODAL ── */
    .targets-btn {
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text-sec); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all .2s;
    }
    .targets-btn:hover { border-color: var(--teal); color: var(--teal); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--card); border-radius: 16px; padding: 28px 32px;
      width: 360px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-title {
      font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .modal-sub { font-size: 12px; color: var(--text-sec); margin-bottom: 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--teal); margin-bottom: 4px; display: block;
    }
    .modal-input {
      width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif;
      text-align: center; transition: border-color .2s;
    }
    .modal-input:focus { outline: none; border-color: var(--teal); }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal-btn {
      flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
      text-transform: uppercase; letter-spacing: 1px; transition: all .2s;
    }
    .modal-btn-save { background: var(--teal); color: #fff; }
    .modal-btn-save:hover { background: #0B7C72; }
    .modal-btn-cancel { background: var(--bg); color: var(--text-sec); border: 1.5px solid var(--border); }
    .modal-btn-cancel:hover { border-color: var(--text-sec); }

    /* ── KANBAN ── */
    .kanban-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .meal-col {
      background: #F0FDFA;
      border-radius: 10px;
      padding: 12px;
      min-height: 160px;
      border: 1.5px solid #CCFBF1;
    }
    .meal-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid #CCFBF1;
    }
    .meal-col-title {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .meal-icon { font-size: 0.9rem; }
    .meal-kcal {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-sec);
      background: white;
      padding: 2px 7px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .triple-check {
      display: inline-flex; gap: 1px; margin-left: 4px; vertical-align: middle;
    }
    .tc-chk {
      font-size: 0.6rem; font-weight: 900; line-height: 1;
    }
    .tc-chk.pass-prot { color: #93C5FD; }
    .tc-chk.pass-carbs { color: #86EFAC; }
    .tc-chk.pass-fat { color: #FDE68A; }
    .tc-chk.fail { color: rgba(255,255,255,0.3); }
    .tc-junk { color: #EF4444; font-size: 0.85em; }
    .meal-col-header .tc-junk { color: #DC2626; }
    .meal-col-header .tc-chk.pass-prot { color: #4A9EF5; }
    .meal-col-header .tc-chk.pass-carbs { color: #22C55E; }
    .meal-col-header .tc-chk.pass-fat { color: #F5D423; }
    .meal-col-header .tc-chk.fail { color: #d1d5db; }
    .meal-macros-bar {
      display: flex; justify-content: center; gap: 4px;
      padding: 2px 0 6px;
    }
    .meal-macro-tag {
      font-size: 0.65rem; font-weight: 600; padding: 2px 7px;
      border-radius: 6px; border: 1px solid;
    }
    .meal-macro-tag.prot { background: #EFF6FF; color: #3B82F6; border-color: #BFDBFE; }
    .meal-macro-tag.carbs { background: #F0FDF4; color: #16A34A; border-color: #BBF7D0; }
    .meal-macro-tag.fat { background: #FFFBEB; color: #D97706; border-color: #FDE68A; }
    .food-card {
      background: white;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 7px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: transform .15s, box-shadow .15s;
    }
    .food-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .food-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }
    .food-grams {
      font-size: 0.65rem;
      color: var(--text-sec);
      margin-bottom: 6px;
    }
    .macro-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
    }
    .macro-chip {
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 4px;
      text-align: center;
    }
    .macro-chip-label {
      font-size: 0.55rem;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: .4px;
      display: block;
    }
    .macro-chip-val {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    .empty-meal {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 20px 10px;
      text-align: center;
      color: var(--text-sec);
      font-size: 0.7rem;
      font-style: italic;
    }

    /* ── ALERTS ── */
    .alerts-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .alerts-toggle-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alerts-count {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--red-light);
      color: var(--red);
    }
    .alerts-count.ok { background: var(--green-light); color: var(--green); }
    .chevron {
      font-size: 0.7rem;
      color: var(--text-sec);
      transition: transform .2s;
    }
    .chevron.open { transform: rotate(180deg); }
    .alerts-body { margin-top: 16px; }
    .alert-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
    }
    .alert-card.red { background: var(--red-light); color: #991B1B; }
    .alert-card.yellow { background: var(--yellow-light); color: #92400E; }
    .alert-card.green { background: var(--green-light); color: #065F46; }
    .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .alert-msg { font-weight: 500; line-height: 1.4; }
    .alert-all-good {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: var(--green-light);
      border-radius: 8px;
      color: var(--green);
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* ── HISTORICAL CHART ── */
    .metric-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .metric-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: none;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-sec);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }
    .metric-btn:hover { border-color: var(--teal); color: var(--teal); }
    .metric-btn.active { background: var(--teal); color: white; border-color: var(--teal); }
    .chart-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .chart-svg-container {
      position: relative;
      min-height: 200px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .stat-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-val {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      display: block;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: .8px;
      display: block;
      margin-top: 3px;
    }
    .no-data-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-sec);
    }
    .no-data-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .no-data-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .no-data-sub { font-size: 0.8rem; }

    /* ── FOOD DATABASE ── */
    .db-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .db-count {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--teal-light);
      color: var(--teal);
      padding: 2px 8px;
      border-radius: 8px;
    }
    .db-body { margin-top: 16px; }
    .db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    .db-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-sec);
      border-bottom: 2px solid var(--border);
    }
    .db-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .db-table tr:last-child td { border-bottom: none; }
    .db-table tr:hover td { background: var(--bg); }
    .source-badge {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .source-badge.recetario { background: var(--teal-light); color: var(--teal); }
    .source-badge.verified { background: var(--green-light); color: var(--green); }
    .source-badge.web { background: var(--yellow-light); color: #92400E; }
    .source-badge.user { background: #EDE9FE; color: #6D28D9; }
    .source-badge.manual { background: #FEF3C7; color: #D97706; }

    /* ── UPLOAD DISH MODAL ── */
    .upload-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-modal {
      background: #fff; border-radius: 16px; padding: 24px; width: 340px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .upload-modal h3 { margin: 0 0 16px; font-size: 16px; color: var(--text); }
    .upload-modal label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sec); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .5px; }
    .upload-modal input, .upload-modal select {
      width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: 'Inter', sans-serif; box-sizing: border-box;
    }
    .upload-modal input:focus, .upload-modal select:focus { border-color: var(--teal); outline: none; }
    .upload-modal .upload-macros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .upload-modal .upload-actions { display: flex; gap: 8px; margin-top: 16px; }
    .upload-modal .upload-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; border: none; }
    .upload-modal .upload-btn-cancel { background: var(--bg); color: var(--text-sec); }
    .upload-modal .upload-btn-save { background: var(--teal); color: #fff; }
    .db-edit-btn {
      padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--bg); font-size: 10px; cursor: pointer; color: var(--text-sec);
      transition: all .15s;
    }
    .db-edit-btn:hover { border-color: var(--teal); color: var(--teal); }
    .db-inline-input {
      width: 60px; padding: 3px 6px; border: 1.5px solid var(--teal); border-radius: 4px;
      font-size: 12px; font-weight: 600; text-align: center; font-family: 'Inter', sans-serif;
    }
    .db-inline-input:focus { outline: none; }
    .db-save-btn {
      padding: 3px 10px; border-radius: 4px; border: none;
      background: var(--teal); color: #fff; font-size: 10px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .db-save-btn:hover { background: #0B7C72; }
    .db-cancel-btn {
      padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-sec); font-size: 10px; cursor: pointer;
    }
    .db-delete-btn {
      padding: 3px 8px; border-radius: 4px; border: 1px solid var(--red-light);
      background: var(--red-light); font-size: 10px; cursor: pointer; color: var(--red);
      transition: all .15s;
    }
    .db-delete-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .db-actions { display: flex; gap: 4px; }
    .confirm-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,.5); z-index: 9999;

<!-- APP -->
<script>
(function () {
  'use strict';

  // ── USERS ──────────────────────────────────────────────────────────────
  const USERS = {
    ernesto: { name: 'Ernesto', initial: 'E', targets: { kcal: 1770, prot: 190, carbs: 140, fat: 50 } },
    adriana: { name: 'Adriana', initial: 'A', targets: { kcal: 1200, prot: 120, carbs: 100, fat: 45 } }
  };
  let currentUser = localStorage.getItem('nutria_current_user') || 'ernesto';

  // ── STATE ──────────────────────────────────────────────────────────────
  let currentDate = getTodayStr();
  let currentPeriod = 'hoy';
  let currentMetric = 'kcal';
  let alertsOpen = true;
  let dbOpen = false;
  let mealView = 'list';
  const collapsedMeals = new Set();

  window.toggleMealAccordion = function(meal) {
    if (collapsedMeals.has(meal)) collapsedMeals.delete(meal);
    else collapsedMeals.add(meal);
    render();
  };

  function TARGETS() { return USERS[currentUser].targets; }

  // TDEE by date: 2182 until 2026-04-16, 2145 from 2026-04-17
  function getTDEE(date) {
    if (!date) return 2145;
    return date >= '2026-04-17' ? 2145 : 2182;
  }

  // ── STORAGE LAYER (server → GitHub API → LocalStorage) ──────────────
  let _serverData = { meals: [], overrides: {} };
  let _hasServer = false;
  const LS_MEALS_KEY = 'nutria_meals_v1';
  const LS_OVERRIDES_KEY = 'nutria_overrides_v1';
  const GH_TOKEN_KEY = 'nutria_gh_token';
  const GH_REPO = 'ernesto-ux/NutrIA';
  const GH_FILE = 'local-meals.json';

  function _ghToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }

  function _lsLoad() {
    try {
      const m = localStorage.getItem(LS_MEALS_KEY);
      const o = localStorage.getItem(LS_OVERRIDES_KEY);
      return { meals: m ? JSON.parse(m) : [], overrides: o ? JSON.parse(o) : {} };
    } catch { return { meals: [], overrides: {} }; }
  }
  function _lsSave() {
    try {
      localStorage.setItem(LS_MEALS_KEY, JSON.stringify(_serverData.meals || []));
      localStorage.setItem(LS_OVERRIDES_KEY, JSON.stringify(_serverData.overrides || {}));
    } catch {}
  }

  // GitHub API: read file
  async function _ghRead() {
    const token = _ghToken();
    if (!token) return null;
    try {
      const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!r.ok) return null;
      const json = await r.json();
      const content = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(json.content), c => c.charCodeAt(0))));
      return { data: content, sha: json.sha };
    } catch { return null; }
  }

  // GitHub API: write file (merge, never replace)
  let _ghPushQueue = Promise.resolve();
  function _ghPush() {
    _ghPushQueue = _ghPushQueue.then(async () => {
      const token = _ghToken();
      if (!token) return;
      try {
        // Read current to get sha and merge
        const current = await _ghRead();
        const sha = current ? current.sha : undefined;
        const remote = current ? current.data : { meals: [], overrides: {} };

        // Merge: combine remote + local by id (local wins on conflict)
        const localMeals = _serverData.meals || [];
        const remoteMeals = remote.meals || [];
        const mealMap = new Map();
        remoteMeals.forEach(m => mealMap.set(m.id, m));
        localMeals.forEach(m => mealMap.set(m.id, m));
        const merged = { meals: [...mealMap.values()], overrides: { ...(remote.overrides || {}), ...(_serverData.overrides || {}) } };

        const body = { message: 'NutrIA sync', content: btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2)))), branch: 'main' };
        if (sha) body.sha = sha;
        const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (r.ok) {
          _serverData = merged;
          _lsSave();
        }
      } catch(e) { console.warn('GitHub sync failed:', e); }
    });
  }

  // Token setup UI
  window.setupGHToken = function() {
    const current = _ghToken();
    const token = prompt('GitHub Personal Access Token (fine-grained, repo NutrIA):', current || '');
    if (token !== null) {
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
      showToast(token.trim() ? 'Token guardado' : 'Token eliminado');
      render();
    }
  };

  async function loadServerData() {
    // 1) Try local server (home network)
    try {
      const r = await fetch('/api/data');
      if (r.ok) {
        _serverData = await r.json();
        _hasServer = true;
        return;
      }
    } catch(e) {}

    // 2) Try GitHub API
    _hasServer = false;
    const gh = await _ghRead();
    if (gh) {
      _serverData = gh.data;
      _lsSave();
      return;
    }

    // 3) Fallback: LocalStorage only
    _serverData = _lsLoad();
  }

  function getLocalMeals() {
    return (_serverData.meals || []).filter(m => (m.user || 'ernesto') === currentUser);
  }
  function getAllLocalMealsRaw() {
    return _serverData.meals || [];
  }
  function saveLocalMeals(meals) {
    const otherUserMeals = (_serverData.meals || []).filter(m => (m.user || 'ernesto') !== currentUser);
    _serverData.meals = [...otherUserMeals, ...meals];
    _lsSave();
    if (_hasServer) return;
    _ghPush();
  }
  function addLocalMeal(entry) {
    entry.user = currentUser;
    _serverData.meals.push(entry);
    _lsSave();
    if (_hasServer) {
      fetch('/api/meal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(entry) }).catch(() => {});
    } else {
      _ghPush();
    }
  }

  function lsPendingKey() { return 'nutria_pending_' + currentUser; }
  function getPendingFoods() {
    try { return JSON.parse(localStorage.getItem(lsPendingKey()) || '[]'); } catch { return []; }
  }
  function savePendingFoods(items) {
    localStorage.setItem(lsPendingKey(), JSON.stringify(items));
  }
  function addPendingFood(name, grams, meal) {
    const items = getPendingFoods();
    items.push({ name, grams, meal, date: currentDate, addedAt: new Date().toISOString() });
    savePendingFoods(items);
  }
  function removePendingFood(idx) {
    const items = getPendingFoods();
    items.splice(idx, 1);
    savePendingFoods(items);
    render();
  }

  // Auto-clear pending items that have been logged
  function autoCleanPending() {
    const items = getPendingFoods();
    if (items.length === 0) return;
    const allMeals = getAllMeals();
    const tokenize = s => s.toLowerCase().split(/[^a-z0-9]+/).filter(w => w.length > 2);
    const cleaned = items.filter(p => {
      const pTokens = tokenize(p.name);
      if (pTokens.length === 0) return true;
      const logged = allMeals.some(m =>
        m.date === p.date && m.meal === p.meal &&
        m.items.some(it => {
          const itTokens = tokenize(it.name);
          const matches = pTokens.filter(pt => itTokens.some(itt => itt.includes(pt) || pt.includes(itt)));
          return matches.length >= Math.min(pTokens.length, 2);
        })
      );
      return !logged;
    });
    if (cleaned.length < items.length) {
      savePendingFoods(cleaned);
    }
  }

  // ── OVERRIDES (for editing/deleting file entries) ────────────────────
  function getOverrides() {
    return _serverData.overrides || {};
  }
  function saveOverrides(o) {
    _serverData.overrides = o;
    _lsSave();
    if (_hasServer) {
      for (const [id, action] of Object.entries(o)) {
        fetch('/api/override', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, action }) }).catch(() => {});
      }
    } else {
      _ghPush();
    }
  }

  // ── MERGED DATA (GitHub + MEAL_LOG fallback, deduplicated by id) ──
  function getAllMeals() {
    const overrides = getOverrides();
    const ghMeals = getLocalMeals();
    const ghIds = new Set(ghMeals.map(m => m.id));
    const fallback = MEAL_LOG
      .filter(e => !ghIds.has(e.id) && (e.who || 'ernesto') === currentUser)
      .map(e => ({ ...e, source: 'file' }));
    return [...ghMeals, ...fallback]
      .filter(e => !overrides[e.id] || overrides[e.id] !== 'deleted')
      .map(e => overrides[e.id] && overrides[e.id] !== 'deleted' ? { ...e, items: overrides[e.id] } : e);
  }

  // TARGETS is now a function: TARGETS() returns current user's targets
  const MEAL_ORDER = NUTRITION_CONFIG.meals;
  const MEAL_LABELS = NUTRITION_CONFIG.mealLabels;
  const MEAL_ICONS = NUTRITION_CONFIG.mealIcons;

  // ── UTILS ──────────────────────────────────────────────────────────────
  function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function parseDate(str) {
    // YYYY-MM-DD -> Date (local, not UTC)
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function formatDateDisplay(str) {
    const d = parseDate(str);
    return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  }

  function addDays(str, n) {
    const d = parseDate(str);
    d.setDate(d.getDate() + n);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function round1(n) { return Math.round(n * 10) / 10; }

  function tripleCheck(kcal, prot, carbs, fat, dailyTarget) {
    if (kcal <= 0) return '';
    const pP = prot / kcal >= 0.10;
    const pC = carbs / kcal <= 0.07;
    const pF = fat / kcal <= 0.05;
    if (pP && pC && pF) return `<span class="triple-check" title="Power Meal ⭐ P${round1(prot/kcal*100)}% C${round1(carbs/kcal*100)}% F${round1(fat/kcal*100)}%">⭐</span>`;
    if (!pP && !pC && !pF && dailyTarget && kcal > dailyTarget * 0.25) return `<span class="triple-check tc-junk" title="Junk Meal ❌ P${round1(prot/kcal*100)}% C${round1(carbs/kcal*100)}% F${round1(fat/kcal*100)}% (${round1(kcal/dailyTarget*100)}% del dia)">❌</span>`;
    return `<span class="triple-check">`
      + `<span class="tc-chk ${pP ? 'pass-prot' : 'fail'}" title="Prot ${round1(prot/kcal*100)}%">✓</span>`
      + `<span class="tc-chk ${pC ? 'pass-carbs' : 'fail'}" title="Carbs ${round1(carbs/kcal*100)}%">✓</span>`
      + `<span class="tc-chk ${pF ? 'pass-fat' : 'fail'}" title="Fat ${round1(fat/kcal*100)}%">✓</span>`
      + `</span>`;
  }

  // ── DATA HELPERS ──────────────────────────────────────────────────────
  function getDay(date) {
    return getAllMeals().filter(e => e.date === date);
  }

  function getDayTotals(date) {
    const entries = getDay(date);
    const t = { kcal: 0, prot: 0, carbs: 0, fat: 0 };
    entries.forEach(entry => {
      entry.items.forEach(item => {
        t.kcal  += (item.kcal  || 0);
        t.prot  += (item.prot  || 0);
        t.carbs += (item.carbs || 0);
        t.fat   += (item.fat   || 0);
      });
    });
    t.kcal  = round1(t.kcal);
    t.prot  = round1(t.prot);
    t.carbs = round1(t.carbs);
    t.fat   = round1(t.fat);
    return t;
  }

  function getHealthStatus(totals) {
    const hasData = totals.kcal > 0 || totals.prot > 0;
    if (!hasData) return 'empty';

    const ratios = {
      kcal:  totals.kcal  / TARGETS().kcal,
      prot:  totals.prot  / TARGETS().prot,
      carbs: totals.carbs / TARGETS().carbs,
      fat:   totals.fat   / TARGETS().fat,
    };

    // Worst case: any macro over 120% (surplus is bad)
    const anyOver120 = Object.values(ratios).some(r => r > 1.20);
    // All macros 90-110% (optimal)
    const allOptimal = Object.values(ratios).every(r => r >= 0.90 && r <= 1.10);
    // All macros at least 75%
    const allAbove75 = Object.values(ratios).every(r => r >= 0.75);
    // Any below 50%
    const anyBelow50 = Object.values(ratios).some(r => r < 0.50 && r > 0);

    if (anyOver120) return 'over';
    if (allOptimal) return 'green';
    if (allAbove75) return 'progressing';
    if (anyBelow50) return 'low';
    return 'yellow';
  }

  function getAlerts(date) {
    const totals = getDayTotals(date);
    const cfg = NUTRITION_CONFIG.alerts;
    const alerts = [];

    if (totals.kcal === 0) {
      alerts.push({ severity: 'yellow', icon: '⚠️', msg: 'Sin datos para este dia.' });
      return alerts;
    }

    // Missing meals
    const loggedMeals = new Set(getDay(date).map(e => e.meal));
    MEAL_ORDER.forEach(m => {
      if (!loggedMeals.has(m)) {
        alerts.push({ severity: 'yellow', icon: '🍽️', msg: `${MEAL_LABELS[m]} sin registrar.` });
      }
    });

    // Protein deficit
    if (totals.prot < TARGETS().prot * cfg.proteinMinPct) {
      const diff = Math.round(TARGETS().prot - totals.prot);
      alerts.push({ severity: 'red', icon: '💪', msg: `Deficit de proteina: faltan ~${diff}g para cubrir el objetivo.` });
    }

    // Calorie surplus
    if (totals.kcal > TARGETS().kcal * cfg.calorieMaxPct) {
      const surplus = Math.round(totals.kcal - TARGETS().kcal);
      alerts.push({ severity: 'red', icon: '🔥', msg: `Exceso de calorias: +${surplus} kcal sobre el objetivo.` });
    }

    // Fat excess
    if (totals.fat > TARGETS().fat * cfg.fatMaxPct) {
      const surplus = round1(totals.fat - TARGETS().fat);
      alerts.push({ severity: 'yellow', icon: '🧈', msg: `Exceso de grasas: +${surplus}g sobre el objetivo.` });
    }

    // Streak
    const streak = calcStreak(date);
    if (streak >= 3) {
      alerts.push({ severity: 'green', icon: '🔥', msg: `¡Racha de ${streak} dias cumpliendo los objetivos!` });
    }

    return alerts;
  }

  function calcStreak(endDate) {
    let streak = 0;
    let d = endDate;
    for (let i = 0; i < 365; i++) {
      const totals = getDayTotals(d);
      if (totals.kcal === 0) break;
      const status = getHealthStatus(totals);
      if (status === 'green') {
        streak++;
        d = addDays(d, -1);
      } else {
        break;
      }
    }
    return streak;
  }

  function getPeriodDates(period, anchor) {
    const dates = [];
    let start, end;
    const today = anchor || getTodayStr();

    if (period === '7dias') {
      start = addDays(today, -6);
      end = today;
    } else if (period === 'mes') {
      const d = parseDate(today);
      start = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
      end = today;
    } else {
      // 'todo' - find first logged date
      const allDates = getAllMeals().map(e => e.date).sort();
      if (allDates.length === 0) return [];
      start = allDates[0];
      end = today;
    }

    let cur = start;
    while (cur <= end) {
      dates.push(cur);
      cur = addDays(cur, 1);
    }
    return dates;
  }

  function getPeriodData(period) {
    const dates = getPeriodDates(period, currentDate);
    return dates.map(date => ({ date, totals: getDayTotals(date) }));
  }

  // ── RING SVG ──────────────────────────────────────────────────────────
  function colorForRatio(ratio) {
    if (ratio >= 0.90 && ratio <= 1.10) return 'var(--green)';
    if (ratio > 1.10) return 'var(--red)';
    if (ratio >= 0.75) return 'var(--yellow)';
    if (ratio >= 0.50) return '#FB923C'; // orange
    return 'var(--red)';
  }

  function renderRing(label, value, target, unit, ringColor) {
    const ratio = target > 0 ? Math.min(value / target, 1.3) : 0;
    const clampedRatio = Math.min(ratio, 1);
    const color = ringColor || colorForRatio(target > 0 ? value / target : 0);
    const r = 34;
    const circ = 2 * Math.PI * r;
    const dash = clampedRatio * circ;
    const id = `ring-${label.toLowerCase().replace(/\s/g,'')}`;
    const displayVal = value > 0 ? (unit === 'kcal' ? Math.round(value) : round1(value)) : '–';
    const targetDisplay = unit === 'kcal' ? Math.round(target) : target;

    const excess = value > target && target > 0 ? value - target : 0;
    const excessDisplay = excess > 0
      ? `<span class="ring-excess">+${unit === 'kcal' ? Math.round(excess) : round1(excess)}</span>`
      : '';

    return `
      <div class="ring-wrap">
        ${excessDisplay}
        <div class="ring-svg-container">
          <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="${r}" />
            <circle
              class="ring-fg"
              cx="40" cy="40" r="${r}"
              stroke="${color}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${circ - dash}"
              id="${id}"
            />
          </svg>
          <div class="ring-center">
            <span class="ring-val">${displayVal}</span>
            <span class="ring-target">/${targetDisplay}</span>
          </div>
        </div>
        <span class="ring-label">${label}</span>
      </div>`;
  }

  // ── DAILY VIEW ────────────────────────────────────────────────────────
  window.setMealView = function(v) {
    mealView = v;
    render();
  };

  window.copyForMFP = function() {
    const allMeals = getAllMeals();
    const dayMeals = allMeals.filter(m => m.date === currentDate);
    const lines = [];
    const userName = USERS[currentUser].name;
    lines.push(`${userName} - ${currentDate}`);
    lines.push('');
    MEAL_ORDER.forEach(m => {
      const entries = dayMeals.filter(e => e.meal === m);
      const items = entries.flatMap(e => e.items || []);
      if (items.length === 0) return;
      lines.push(`${MEAL_LABELS[m].toUpperCase()}`);
      items.forEach(item => {
        lines.push(`  ${item.name} — ${item.grams}g — ${Math.round(item.kcal)}kcal | P${round1(item.prot)}g C${round1(item.carbs)}g F${round1(item.fat)}g`);
      });
      lines.push('');
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('Copiado para MFP'));
  };

  // Copy JSON for Apple Health shortcut
  window.copyForHealth = function() {
    // Read directly from the DOM food-cards to avoid any data source issues
    const cards = document.querySelectorAll('.food-card[data-meal]');
    if (cards.length === 0) { alert('Sin comidas para copiar'); return; }

    // Aggregate by meal
    const mealTotals = {};
    cards.forEach(card => {
      const meal = card.getAttribute('data-meal');
      const kcal = parseFloat(card.getAttribute('data-kcal')) || 0;
      const prot = parseFloat(card.getAttribute('data-prot')) || 0;
      const carbs = parseFloat(card.getAttribute('data-carbs')) || 0;
      const fat = parseFloat(card.getAttribute('data-fat')) || 0;
      if (!mealTotals[meal]) mealTotals[meal] = { kcal: 0, prot: 0, carbs: 0, fat: 0 };
      mealTotals[meal].kcal += kcal;
      mealTotals[meal].prot += prot;
      mealTotals[meal].carbs += carbs;
      mealTotals[meal].fat += fat;
    });

    const MEAL_TIMES = { desayuno: '08:00', almuerzo: '13:00', snack: '16:00', cena: '20:00' };
    const lines = [];
    for (const [meal, t] of Object.entries(mealTotals)) {
      const time = MEAL_TIMES[meal] || '12:00';
      const r = v => Math.round(v * 10) / 10;
      lines.push(`${currentDate} ${time}|${r(t.kcal)}|${r(t.prot)}|${r(t.carbs)}|${r(t.fat)}`);
    }

    const text = lines.join('\n');
    // Use prompt() - works on every browser including iOS Safari
    window.prompt('Select All + Copy this text, then run NutrIA shortcut:', text);
  };

  function renderDay() {
    const totals = getDayTotals(currentDate);
    const status = getHealthStatus(totals);
    const alerts = getAlerts(currentDate);

    const badgeMap = {
      green: ['Optimo ✓', 'green'],
      progressing: ['En camino', 'green'],
      yellow: ['Atencion', 'yellow'],
      low: ['Muy bajo', 'orange'],
      over: ['Exceso', 'red'],
      empty: ['Sin datos', 'yellow'],
    };
    const [badgeText, badgeClass] = badgeMap[status];

    // Build kanban - track entry refs for edit/delete
    const mealItems = {};
    MEAL_ORDER.forEach(m => { mealItems[m] = []; });
    getDay(currentDate).forEach(entry => {
      if (mealItems[entry.meal]) {
        entry.items.forEach((item, idx) => {
          mealItems[entry.meal].push({ ...item, _entryId: entry.id, _itemIdx: idx, _source: entry.source || 'file' });
        });

    const mealKcal = {};
    const mealMacros = {};

      mealKcal[m] = round1(mealItems[m].reduce((s, i) => s + (i.kcal || 0), 0));

        carbs: round1(mealItems[m].reduce((s, i) => s + (i.carbs || 0), 0)),
        fat: round1(mealItems[m].reduce((s, i) => s + (i.fat || 0), 0))
      };

    const kanbanCols = MEAL_ORDER.map(m => {

      const itemCards = items.length === 0
        ? `<div class="empty-meal">Sin registro</div>`

          <div class="food-card" draggable="true" data-entry-id="${item._entryId}" data-item-idx="${item._itemIdx}" data-source="${item._source}" data-meal="${m}" data-food-id="${item.foodId || ''}" data-food-name="${item.name}" data-grams="${item.grams}" data-kcal="${item.kcal || 0}" data-prot="${item.prot || 0}" data-carbs="${item.carbs || 0}" data-fat="${item.fat || 0}">

              </div>
            </div>
            <div class="macro-bar">

              <div class="macro-chip"><span class="macro-chip-label">prot</span><span class="macro-chip-val">${round1(item.prot || 0)}g</span></div>
              <div class="macro-chip"><span class="macro-chip-label">carbs</span><span class="macro-chip-val">${round1(item.carbs || 0)}g</span></div>
              <div class="macro-chip"><span class="macro-chip-label">fat</span><span class="macro-chip-val">${round1(item.fat || 0)}g</span></div>
            </div>
          </div>`).join('');

      return `
        <div class="meal-col" data-meal="${m}">

            <div class="meal-col-title">
              <span class="meal-icon">${MEAL_ICONS[m]}</span>

            </div>
            <span class="meal-kcal">${kcal > 0 ? Math.round(kcal) + ' kcal' + tripleCheck(kcal, mealMacros[m].prot, mealMacros[m].carbs, mealMacros[m].fat, TARGETS().kcal) : '—'}</span>
          </div>
          ${kcal > 0 ? `<div class="meal-macros-bar"><span class="meal-macro-tag prot">${mealMacros[m].prot}P</span><span class="meal-macro-tag carbs">${mealMacros[m].carbs}C</span><span class="meal-macro-tag fat">${mealMacros[m].fat}F</span></div>` : ''}

    // Alerts
    const alertCards = alerts.length === 0
      ? `<div class="alert-all-good"><span>✅</span><span>Todo en orden. Sigue asi.</span></div>`
      : alerts.map(a => `
          <div class="alert-card ${a.severity}">
            <span class="alert-icon">${a.icon}</span>
            <span class="alert-msg">${a.msg}</span>
          </div>`).join('');

    const alertsCountHtml = alerts.length === 0
      ? `<span class="alerts-count ok">✓ OK</span>`
      : `<span class="alerts-count">${alerts.length}</span>`;

    return `
      <!-- LOG FORM hidden from UI, use /log-food -->
      ${''}


      <!-- SUMMARY RINGS -->
      <div class="card">
        <div class="card-title">Resumen del dia</div>
        <div class="rings-section">
          <div class="rings-grid">
            ${renderRing('Calorias', totals.kcal, TARGETS().kcal, 'kcal', '#1E293B')}
            ${renderRing('Proteina', totals.prot, TARGETS().prot, 'g', '#3B82F6')}
            ${renderRing('Carbs', totals.carbs, TARGETS().carbs, 'g', '#22C55E')}
            ${renderRing('Grasas', totals.fat, TARGETS().fat, 'g', '#F59E0B')}
          </div>
          <span class="health-badge ${badgeClass}">${badgeText}</span>
        </div>
      </div>

      <!-- MEALS -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="card-title" style="margin-bottom:0;">Comidas del dia</div>
          <div class="view-toggle">
            <!-- Health button hidden: <button class="view-btn" onclick="copyForHealth()" title="Copia para Apple Health shortcut">❤️ Health</button> -->
          </div>
        </div>
        <div class="list-view">${renderMFPList(mealItems, mealKcal, mealMacros)}</div>
      </div>

      <!-- ALERTS -->
      <div class="card">
        <div class="alerts-toggle" onclick="toggleAlerts()">
          <span class="card-title" style="margin-bottom:0">Alertas y notificaciones</span>
          <div class="alerts-toggle-right">
            ${alertsCountHtml}
            <span class="chevron ${alertsOpen ? 'open' : ''}" id="alerts-chevron">&#9660;</span>
          </div>
        </div>
        <div class="alerts-body" id="alerts-body" style="display:${alertsOpen ? 'block' : 'none'}">
          ${alertCards}
        </div>
      </div>`;
  }

  // ── HISTORICAL VIEW ───────────────────────────────────────────────────
  function renderHistory(period) {
    const data = getPeriodData(period);

    if (data.length === 0 || data.every(d => d.totals.kcal === 0 && d.totals.prot === 0)) {
      return `
        <div class="card">
          <div class="no-data-msg">
            <div class="no-data-icon">📊</div>
            <div class="no-data-title">Sin datos historicos</div>
            <div class="no-data-sub">Registra comidas para ver tu historial.</div>
          </div>
        </div>`;
    }

    const metricLabels = { kcal: 'Calorias', prot: 'Proteina', carbs: 'Carbs', fat: 'Grasas' };
    const metricUnits = { kcal: 'kcal', prot: 'g', carbs: 'g', fat: 'g' };
    const metricTargets = { kcal: TARGETS().kcal, prot: TARGETS().prot, carbs: TARGETS().carbs, fat: TARGETS().fat };

    const metricBtns = Object.keys(metricLabels).map(k =>
      `<button class="metric-btn ${k === currentMetric ? 'active' : ''}" onclick="setMetric('${k}')">${metricLabels[k]}</button>`
    ).join('');

    // Chart
    const target = metricTargets[currentMetric];
    const values = data.map(d => d.totals[currentMetric]);
    const maxVal = Math.max(...values, target * 1.2) * 1.05;
    const chartW = Math.max(data.length * 44, 400);
    const chartH = 180;
    const padL = 52, padR = 16, padT = 16, padB = 36;
    const plotW = chartW - padL - padR;
    const plotH = chartH - padT - padB;
    const targetY = padT + plotH - (target / maxVal) * plotH;

    // Y axis labels
    const yTicks = 4;
    const yTickLabels = Array.from({ length: yTicks + 1 }, (_, i) => {
      const val = Math.round((maxVal / yTicks) * i);
      const y = padT + plotH - (val / maxVal) * plotH;
      return `<text x="${padL - 6}" y="${y + 4}" text-anchor="end" font-size="9" fill="#94A3B8" font-family="Inter,sans-serif">${val}</text>
              <line x1="${padL}" y1="${y}" x2="${padL + plotW}" y2="${y}" stroke="#E2E8F0" stroke-width="1" />`;
    }).join('');

    const bars = data.map((d, i) => {
      const val = d.totals[currentMetric];
      const ratio = target > 0 ? val / target : 0;
      const [gLo, gHi] = NUTRITION_CONFIG.health.greenRange;
      const [yLo, yHi] = NUTRITION_CONFIG.health.yellowRange;
      let color = '#EF4444';
      if (ratio >= gLo && ratio <= gHi) color = '#059669';
      else if (ratio >= yLo && ratio <= yHi) color = '#F59E0B';

      const barW = Math.max(plotW / data.length - 8, 10);
      const barH = val > 0 ? Math.max((val / maxVal) * plotH, 2) : 0;
      const x = padL + (i / data.length) * plotW + (plotW / data.length - barW) / 2;
      const y = padT + plotH - barH;

      // Date label
      const dateParsed = parseDate(d.date);
      const dayLabel = dateParsed.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

      return `
        <rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="3" opacity="0.85">
          <title>${d.date}: ${round1(val)} ${metricUnits[currentMetric]}</title>
        </rect>
        <text x="${x + barW / 2}" y="${padT + plotH + 14}" text-anchor="middle" font-size="8" fill="#94A3B8" font-family="Inter,sans-serif">${dayLabel}</text>`;
    }).join('');

    // Target line
    const targetLine = `
      <line x1="${padL}" y1="${targetY}" x2="${padL + plotW}" y2="${targetY}" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="4,3" />
      <text x="${padL + plotW + 4}" y="${targetY + 4}" font-size="8" fill="#0D9488" font-family="Inter,sans-serif">obj</text>`;

    const chartSvg = `
      <svg width="${chartW}" height="${chartH}" viewBox="0 0 ${chartW} ${chartH}">
        ${yTickLabels}
        ${bars}
        ${targetLine}
        <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + plotH}" stroke="#E2E8F0" stroke-width="1.5" />
        <line x1="${padL}" y1="${padT + plotH}" x2="${padL + plotW}" y2="${padT + plotH}" stroke="#E2E8F0" stroke-width="1.5" />
      </svg>`;

    // Stats
    const daysWithData = data.filter(d => d.totals[currentMetric] > 0);
    const avgVal = daysWithData.length > 0
      ? round1(daysWithData.reduce((s, d) => s + d.totals[currentMetric], 0) / daysWithData.length)
      : 0;
    const sortedByMetric = [...daysWithData].sort((a, b) => b.totals[currentMetric] - a.totals[currentMetric]);
    const bestDay = sortedByMetric.length > 0 ? sortedByMetric[0] : null;
    const worstDay = sortedByMetric.length > 0 ? sortedByMetric[sortedByMetric.length - 1] : null;
    const streak = calcStreak(currentDate);

    const bestLabel = bestDay ? parseDate(bestDay.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '—';
    const worstLabel = worstDay ? parseDate(worstDay.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '—';

    return `
      <div class="card">
        <div class="card-title">Historial — ${period === '7dias' ? 'Ultimos 7 dias' : period === 'mes' ? 'Este mes' : 'Todo el tiempo'}</div>
        <div class="metric-toggle">${metricBtns}</div>
        <div class="chart-wrap">
          <div class="chart-svg-container">${chartSvg}</div>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-val">${avgVal > 0 ? avgVal : '—'}</span>
            <span class="stat-label">Promedio ${metricUnits[currentMetric]}</span>
          </div>
          <div class="stat-box">
            <span class="stat-val">${bestDay ? round1(bestDay.totals[currentMetric]) : '—'}</span>
            <span class="stat-label">Mejor dia (${bestLabel})</span>
          </div>
          <div class="stat-box">
            <span class="stat-val">${worstDay ? round1(worstDay.totals[currentMetric]) : '—'}</span>
            <span class="stat-label">Peor dia (${worstLabel})</span>
          </div>
          <div class="stat-box">
            <span class="stat-val">${streak > 0 ? streak : '0'}</span>
            <span class="stat-label">Racha (dias)</span>
          </div>
        </div>
      </div>`;
  }

  // ── FOOD DATABASE PANEL ───────────────────────────────────────────────
  function getFoodOverrides() {
    try { return JSON.parse(localStorage.getItem('nutria_food_overrides') || '{}'); } catch { return {}; }
  }
  function saveFoodOverrides(o) { localStorage.setItem('nutria_food_overrides', JSON.stringify(o)); }

  function getFoodData(f) {
    const overrides = getFoodOverrides();
    if (overrides[f.id]) return { ...f, per100g: overrides[f.id].per100g, source: overrides[f.id].source || 'verified' };
    return f;
  }

  function renderFoodDB() {
    const sorted = [...FOOD_DATABASE].map(getFoodData).sort((a, b) => a.name.localeCompare(b.name));
    const webCount = sorted.filter(f => f.source === 'web').length;
    const verifiedCount = sorted.filter(f => f.source === 'verified').length;

    const rows = sorted.map(f => {
      const src = f.source || 'manual';
      const badgeClass = src === 'recetario' ? 'recetario' : src === 'verified' ? 'verified' : src === 'web' ? 'web' : src === 'manual' ? 'manual' : 'user';
      const badgeLabel = src === 'verified' ? '✓ verificado' : src === 'web' ? '⚠ web' : src === 'manual' ? '🍽️ ' + (f.author || 'manual') : src;

      return `
      <tr id="db-row-${f.id}">
        <td><strong>${f.name}</strong></td>
        <td>${f.brand || '—'}</td>
        <td>${round1(f.per100g.kcal)}</td>
        <td>${round1(f.per100g.prot)}g</td>
        <td>${round1(f.per100g.carbs)}g</td>
        <td>${round1(f.per100g.fat)}g</td>
        <td><span class="source-badge ${badgeClass}">${badgeLabel}</span></td>
        <td><div class="db-actions">
          <button class="db-edit-btn" onclick="editFoodDB('${f.id}')">✏️</button>
          <button class="db-delete-btn" onclick="confirmDeleteFood('${f.id}','${f.name.replace(/'/g, "\\'")}')">🗑</button>
        </div></td>
      </tr>`;
    }).join('');

    const tableHtml = FOOD_DATABASE.length === 0
      ? `<p style="color:var(--text-sec);font-size:.8rem;text-align:center;padding:20px;">Sin alimentos en la base de datos.</p>`
      : `<div style="overflow-x:auto"><table class="db-table">
          <thead><tr>
            <th>Nombre</th><th>Marca</th><th>Kcal/100g</th><th>Prot</th><th>Carbs</th><th>Grasa</th><th>Fuente</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;

    const statsHtml = webCount > 0 ? `<div style="font-size:11px;color:var(--text-sec);padding:8px 0 0;">⚠ ${webCount} sin verificar &nbsp;·&nbsp; ✓ ${verifiedCount} verificados &nbsp;·&nbsp; ${sorted.length - webCount - verifiedCount} recetario/otros</div>` : '';

    return `
      <div class="card">
        <div class="db-toggle" onclick="toggleDB()">
          <span class="card-title" style="margin-bottom:0">Base de datos de alimentos</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="db-count">${FOOD_DATABASE.length} alimentos</span>
            <span class="chevron ${dbOpen ? 'open' : ''}" id="db-chevron">&#9660;</span>
          </div>
        </div>
        <div class="db-body" id="db-body" style="display:${dbOpen ? 'block' : 'none'}">
          ${tableHtml}
          ${statsHtml}
        </div>
      </div>`;
  }

          <span style="font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:1px;">${c.tag}</span>
        </div>
        <ul style="margin:0;padding-left:18px;font-size:12px;color:var(--text-sec);line-height:1.8;">
          ${c.items.map(i => `<li>${i}</li>`).join('')}
        </ul>
      </div>`).join('');

    return `
      <div class="card">
        <div class="db-toggle" onclick="toggleChangelog()">
          <span class="card-title" style="margin-bottom:0">Changelog</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="db-count">v${CHANGELOG_DATA[0].version}</span>
            <span class="chevron ${changelogOpen ? 'open' : ''}" id="cl-chevron">&#9660;</span>
          </div>
        </div>
        <div id="cl-body" style="display:${changelogOpen ? 'block' : 'none'};padding-top:12px;">
          ${entries}
        </div>
      </div>`;
  }

  // ── INFORMES ─────────────────────────────────────────────────────────

  let informeRange = 'semana'; // dia | semana | mes | custom
  let informeChartMode = 'intake'; // 'intake' | 'deficit'
  let informeShowCombined = false;
  // Default date pickers to last 7 days
  let _initToday = new Date();
  let _initStart = new Date(_initToday); _initStart.setDate(_initToday.getDate() - 6);
  const _fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let informeCustomStart = _fmt(_initStart);
  let informeCustomEnd = _fmt(_initToday);

  window.setInformeRange = function(range) {
    informeRange = range;
    const today = parseDate(getTodayStr());
    const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (range === 'dia') {
      informeCustomStart = fmt(today);
      informeCustomEnd = fmt(today);
    } else if (range === 'semana') {
      const s = new Date(today); s.setDate(today.getDate() - 6);
      informeCustomStart = fmt(s);
      informeCustomEnd = fmt(today);
    } else if (range === 'mes') {
      const s = new Date(today); s.setDate(today.getDate() - 29);
      informeCustomStart = fmt(s);
      informeCustomEnd = fmt(today);
    }
    render();
  };
  window.toggleInformeChartMode = function() {
    informeChartMode = informeChartMode === 'intake' ? 'deficit' : 'intake';
    render();
  };
  window.toggleInformeCombined = function() {
    informeShowCombined = !informeShowCombined;
    render();
  };

  window.setInformeCustomDates = function() {
    const sd = document.getElementById('inf-s-d'), sm = document.getElementById('inf-s-m'), sy = document.getElementById('inf-s-y');
    const ed = document.getElementById('inf-e-d'), em = document.getElementById('inf-e-m'), ey = document.getElementById('inf-e-y');
    if (!sd || !sm || !sy) return;
    const startVal = `${sy.value}-${sm.value}-${sd.value}`;
    if (informeRange === 'dia') {
      informeCustomStart = startVal;
      informeCustomEnd = startVal;
      render();
    } else {
      if (!ed || !em || !ey) return;
      const endVal = `${ey.value}-${em.value}-${ed.value}`;
      informeCustomStart = startVal;
      informeCustomEnd = endVal;
      informeRange = 'custom';
      render();
    }
  };

  function getInformeDates() {
    const today = parseDate(getTodayStr());
    let start, end;

    if (informeRange === 'dia') {
      if (informeCustomStart) {
        start = parseDate(informeCustomStart);
        end = parseDate(informeCustomStart);
      } else {
        start = new Date(today);
        end = new Date(today);
      }
    } else if (informeRange === 'semana') {
      const dow = today.getDay(); // 0=Sun
      const diffToMon = dow === 0 ? 6 : dow - 1; // days back to Monday
      start = new Date(today);
      start.setDate(today.getDate() - diffToMon);
      end = new Date(start);
      end.setDate(start.getDate() + 6); // Sunday
    } else if (informeRange === 'mes') {
      end = new Date(today);
      start = new Date(today);
      start.setDate(today.getDate() - 29);
    } else if (informeRange === 'custom' && informeCustomStart && informeCustomEnd) {
      start = parseDate(informeCustomStart);
      end = parseDate(informeCustomEnd);
    } else {
      end = new Date(today);
      start = new Date(today);
      start.setDate(today.getDate() - 6);
    }

    const dates = [];
    const d = new Date(start);
    while (d <= end) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      dates.push(`${y}-${m}-${dd}`);
      d.setDate(d.getDate() + 1);
    }
    return dates;
  }

  function getActivityForDate(dateStr) {
    if (typeof ACTIVITY_LOG === 'undefined') return null;
    return ACTIVITY_LOG.find(a => a.date === dateStr) || null;
  }

  function getBalanceForDate(dateStr) {
    if (typeof DAILY_BALANCE === 'undefined') return null;
    return DAILY_BALANCE.find(b => b.date === dateStr) || null;
  }

  function renderInformes() {
    const dates = getInformeDates();
    const dayNames = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    const tgt = TARGETS();

    // Collect daily data
    const days = dates.map(date => {
      const totals = getDayTotals(date);
      const activity = getActivityForDate(date);
      const balance = getBalanceForDate(date);
      const d = parseDate(date);
      return {
        date, totals, activity, balance,
        dayName: dayNames[d.getDay()],
        dayLabel: d.toLocaleDateString('es-ES', { day:'numeric', month:'short' }),
        hasData: totals.kcal > 0
      };
    });

    const daysWithData = days.filter(d => d.hasData);
    const numDays = days.length;

    // Aggregates
    const totalIntake = daysWithData.reduce((s,d) => s + d.totals.kcal, 0);
    const totalProt = daysWithData.reduce((s,d) => s + d.totals.prot, 0);
    const totalCarbs = daysWithData.reduce((s,d) => s + d.totals.carbs, 0);
    const totalFat = daysWithData.reduce((s,d) => s + d.totals.fat, 0);
    const avgIntake = daysWithData.length > 0 ? totalIntake / daysWithData.length : 0;
    const avgProt = daysWithData.length > 0 ? totalProt / daysWithData.length : 0;
    const avgCarbs = daysWithData.length > 0 ? totalCarbs / daysWithData.length : 0;
    const avgFat = daysWithData.length > 0 ? totalFat / daysWithData.length : 0;

    // Activity aggregates
    let totalGym = 0, totalStepsKcal = 0, totalSteps = 0, gymSessions = 0;
    days.forEach(d => {
      if (d.activity) {
        totalGym += d.activity.gymKcal || 0;
        totalStepsKcal += d.activity.stepsKcal || 0;
        totalSteps += d.activity.steps || 0;
        if (d.activity.gymKcal > 0) gymSessions++;
      }
    });

    // Energy balance
    const totalTDEE = daysWithData.reduce((s, d) => s + getTDEE(d.date), 0);
    const totalBurn = totalTDEE + totalGym + totalStepsKcal;
    const totalDeficit = totalIntake - totalBurn;
    const fatLost = Math.abs(totalDeficit) / 7700;

    // Range label
    const rangeLabel = informeRange === 'dia' ? `Dia ${dates[0]}`
      : informeRange === 'semana' ? `Semana ${dates[0].slice(8)}-${dates[dates.length-1].slice(8)} ${dates[0].slice(5,7)}`
      : informeRange === 'mes' ? 'Ultimos 30 dias'
      : `${dates[0]} a ${dates[dates.length-1]}`;

    // Period filter buttons
    const filterHtml = `
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <button class="metric-btn ${informeRange==='dia'?'active':''}" onclick="setInformeRange('dia')">Dia</button>
        <button class="metric-btn ${informeRange==='semana'?'active':''}" onclick="setInformeRange('semana')">Semana</button>
        <button class="metric-btn ${informeRange==='mes'?'active':''}" onclick="setInformeRange('mes')">Mes</button>
        <div style="display:flex;gap:6px;align-items:center;margin-left:8px;flex-wrap:wrap;">
          ${(() => {
            const selStyle = 'padding:5px 2px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--card);cursor:pointer;-webkit-appearance:none;appearance:none;';
            const sY = informeCustomStart.slice(0,4), sM = informeCustomStart.slice(5,7), sD = informeCustomStart.slice(8,10);
            const eY = informeCustomEnd.slice(0,4), eM = informeCustomEnd.slice(5,7), eD = informeCustomEnd.slice(8,10);
            const dayOpts = Array.from({length:31},(_,i)=>{const v=String(i+1).padStart(2,'0');return v;});
            const monthNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
            const monthOpts = monthNames.map((n,i)=>({v:String(i+1).padStart(2,'0'),n}));
            const yearOpts = ['2026','2025'];
            const mkSel = (id, opts, cur, isName) => `<select id="${id}" style="${selStyle}">${opts.map(o => {
              const val = isName ? o.v : o;
              const label = isName ? o.n : o;
              return `<option value="${val}" ${val===cur?'selected':''}>${label}</option>`;
            }).join('')}</select>`;
            const startSels = `${mkSel('inf-s-d', dayOpts, sD, false)}${mkSel('inf-s-m', monthOpts, sM, true)}${mkSel('inf-s-y', yearOpts, sY, false)}`;
            const endSels = `${mkSel('inf-e-d', dayOpts, eD, false)}${mkSel('inf-e-m', monthOpts, eM, true)}${mkSel('inf-e-y', yearOpts, eY, false)}`;
            const hideEnd = informeRange === 'dia' ? 'display:none;' : '';
            return `<div style="display:flex;gap:2px;align-items:center;">${startSels}</div>
              <span style="color:var(--text-sec);font-size:12px;${hideEnd}">a</span>
              <div style="display:flex;gap:2px;align-items:center;${hideEnd}">${endSels}</div>
              <button class="metric-btn" onclick="setInformeCustomDates()" style="padding:6px 14px;">Aplicar</button>`;
          })()}
        </div>
      </div>`;

    // KPI cards
    const kpis = [
      { emoji:'🔥', label:'Deficit Total', value: `${Math.abs(Math.round(totalDeficit)).toLocaleString()} kcal`, color: totalDeficit < 0 ? 'var(--green)' : 'var(--red)' },
      { emoji:'⚖️', label:'Grasa Perdida', value: `${fatLost.toFixed(2)} kg`, color: 'var(--teal)', sub: totalDeficit < 0 && avgProt < 1.8 * 89 ? `~${(Math.abs(totalDeficit) * 0.15 / 7700).toFixed(2)} kg musculo` : null },
      { emoji:'🍽️', label:'Promedio/dia', value: `${Math.round(avgIntake)} kcal`, color: avgIntake <= tgt.kcal ? 'var(--green)' : 'var(--yellow)' },
      { emoji:'💪', label:'Gym', value: `${gymSessions}x — ${totalGym.toLocaleString()} kcal`, color: 'var(--teal)' },
      { emoji:'🚶', label:'Pasos', value: `~${totalStepsKcal.toLocaleString()} kcal`, color: 'var(--text-sec)', sub: `${totalSteps.toLocaleString()} (${Math.round(totalSteps/numDays)}/dia)` },
      { emoji:'📅', label:'Dias registrados', value: `${daysWithData.length}/${numDays}`, color: 'var(--text)' },
    ];

    const kpiHtml = kpis.map(k => `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center;">
        <div style="font-size:18px;margin-bottom:2px;">${k.emoji}</div>
        <div style="font-size:15px;font-weight:700;color:${k.color};margin-bottom:1px;line-height:1.2;">${k.value}</div>
        ${k.sub ? `<div style="font-size:10px;color:var(--text-sec);margin-bottom:1px;">${k.sub}</div>` : ''}
        <div style="font-size:9px;color:var(--text-sec);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;">${k.label}</div>
      </div>
    `).join('');

    // Daily balance table
    let tableRows = '';
    let weekTotal = { intake:0, tdee:0, steps:0, gym:0, balance:0 };
    days.forEach(d => {
      const intake = d.hasData ? Math.round(d.totals.kcal) : '—';
      const gym = d.activity && d.activity.gymKcal > 0 ? d.activity.gymKcal : '';
      const steps = d.activity ? d.activity.stepsKcal : '';
      const dayTDEE = getTDEE(d.date);
      const bal = d.hasData ? Math.round(d.totals.kcal - dayTDEE - (d.activity ? d.activity.gymKcal||0 : 0) - (d.activity ? d.activity.stepsKcal||0 : 0)) : '';
      const balNum = typeof bal === 'number' ? bal : 0;
      const balColor = balNum < -1000 ? 'var(--green)' : balNum < 0 ? 'var(--teal)' : balNum > 0 ? 'var(--red)' : 'var(--text-sec)';
      const balStr = typeof bal === 'number' ? (bal > 0 ? '+' + bal : bal) : '—';
      const rowBg = d.dayName === 'Sab' || d.dayName === 'Dom' ? 'rgba(13,148,136,0.04)' : 'transparent';

      if (d.hasData) {
        weekTotal.intake += d.totals.kcal;
        weekTotal.tdee += dayTDEE;
        weekTotal.steps += (d.activity ? d.activity.stepsKcal||0 : 0);
        weekTotal.gym += (d.activity ? d.activity.gymKcal||0 : 0);
        weekTotal.balance += balNum;
      }

      tableRows += `
        <tr style="background:${rowBg};">
          <td style="padding:8px 10px;font-weight:600;color:var(--text);font-size:12px;">${d.dayName}</td>
          <td style="padding:8px 10px;font-size:12px;color:var(--text-sec);">${d.dayLabel}</td>
          <td style="padding:8px 10px;text-align:center;font-size:13px;font-weight:500;">${intake}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;color:var(--text-sec);">${dayTDEE.toLocaleString()}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;color:#F59E0B;font-weight:500;">${steps || '—'}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;color:var(--teal);font-weight:600;">${gym || '—'}</td>
          <td style="padding:8px 10px;text-align:center;font-size:13px;font-weight:700;color:${balColor};">${balStr}</td>
        </tr>`;
    });

    // Total row
    const totalBal = weekTotal.balance;
    tableRows += `
      <tr style="background:var(--teal);color:#fff;">
        <td colspan="2" style="padding:10px;font-weight:700;font-size:12px;">TOTAL</td>
        <td style="padding:10px;text-align:center;font-weight:700;font-size:13px;">${Math.round(weekTotal.intake).toLocaleString()}</td>
        <td style="padding:10px;text-align:center;font-size:12px;">${Math.round(weekTotal.tdee).toLocaleString()}</td>
        <td style="padding:10px;text-align:center;font-size:12px;">${weekTotal.steps}</td>
        <td style="padding:10px;text-align:center;font-size:12px;">${weekTotal.gym.toLocaleString()}</td>
        <td style="padding:10px;text-align:center;font-weight:700;font-size:13px;">${totalBal > 0 ? '+':''}${Math.round(totalBal).toLocaleString()}</td>
      </tr>`;

    // Macro averages vs targets
    const macros = [
      { name:'Calorias', emoji:'🔥', avg: avgIntake, target: tgt.kcal, unit:'kcal' },
      { name:'Proteina', emoji:'💪', avg: avgProt, target: tgt.prot, unit:'g' },
      { name:'Carbs', emoji:'🌾', avg: avgCarbs, target: tgt.carbs, unit:'g' },
      { name:'Grasa', emoji:'🧈', avg: avgFat, target: tgt.fat, unit:'g' },
    ];

    const macroHtml = macros.map(m => {
      const pct = m.target > 0 ? Math.round(m.avg / m.target * 100) : 0;
      const barW = Math.min(pct, 150);
      const color = pct >= 90 && pct <= 110 ? 'var(--green)' : pct > 120 ? 'var(--red)' : 'var(--yellow)';
      return `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;color:var(--text);">${m.emoji} ${m.name}</span>
            <span style="font-size:13px;color:var(--text-sec);">${round1(m.avg)} / ${m.target} ${m.unit} <span style="font-weight:700;color:${color};">(${pct}%)</span></span>
          </div>
          <div style="background:var(--border);border-radius:6px;height:8px;overflow:hidden;">
            <div style="background:${color};height:100%;width:${barW}%;border-radius:6px;transition:width 0.4s;"></div>
          </div>
        </div>`;
    }).join('');

    // Stacked bar chart for daily intake
    const maxKcal = Math.max(...days.map(d => d.totals.kcal), tgt.kcal * 1.3);

    // Deficit mode data
    const deficitData = days.map(d => {
      if (!d.hasData) return { ...d, totalDeficit: 0, stepsKcal: 0, gymKcal: 0, baseDeficit: 0 };
      const dayTDEE = getTDEE(d.date);
      const stepsK = d.activity ? d.activity.stepsKcal || 0 : 0;
      const gymK = d.activity ? d.activity.gymKcal || 0 : 0;
      const baseDeficit = dayTDEE - d.totals.kcal;
      const totalDeficit = baseDeficit + stepsK + gymK;
      return { ...d, totalDeficit, stepsKcal: stepsK, gymKcal: gymK, baseDeficit };
    });
    // For deficit bars: max scale includes total burn (TDEE + steps + gym) to show full picture
    const maxBurn = Math.max(...deficitData.map((d, i) => {
      const totalBurn = getTDEE(days[i].date) + (d.stepsKcal||0) + (d.gymKcal||0);
      return Math.max(Math.abs(d.totalDeficit || 0), totalBurn);
    }), 500);
    const maxDeficit = maxBurn;

    // Zero line for diverging deficit chart — single scale for proportional bars
    const maxDeficitUp = Math.max(...deficitData.filter(d => d.hasData && d.totalDeficit > 0).map(d => d.totalDeficit), 1);
    const maxSurplusDown = Math.max(...deficitData.filter(d => d.hasData && d.totalDeficit < 0).map(d => Math.abs(d.totalDeficit)), 0);
    const hasSurplus = maxSurplusDown > 0;
    const totalRange = maxDeficitUp + maxSurplusDown;
    const zeroFromTop = hasSurplus
      ? Math.round((maxDeficitUp / totalRange) * 120)
      : 120;

    // Helper: day label with emojis BELOW in fixed container
    const isMonthView = informeRange === 'mes' || days.length > 14;
    function dayLabel(d, idx) {
      const gym = d.activity && d.activity.gymKcal > 0;
      const highSteps = d.activity && d.activity.steps >= 10000;
      const dayNum = d.date.slice(8, 10);
      const nameStr = isMonthView ? dayNum : d.dayName;
      const emojis = (gym ? '🏋️' : '') + (highSteps ? '🚶' : '');
      return `<div style="text-align:center;height:28px;">
        <div style="font-size:${isMonthView ? '8' : '9'}px;color:var(--text-sec);height:12px;line-height:12px;">${nameStr}</div>
        <div style="height:16px;font-size:9px;line-height:16px;overflow:hidden;">${emojis || '&nbsp;'}</div>
      </div>`;
    }

    // Month separator labels (only for month view)
    let monthSeparators = '';
    if (isMonthView) {
      const months = {};
      days.forEach((d, i) => {
        const m = d.date.slice(0, 7);
        if (!months[m]) months[m] = { start: i, end: i };
        months[m].end = i;
      });
      const monthNames = { '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic' };
      monthSeparators = `<div style="display:flex;gap:2px;margin-top:2px;">
        ${Object.entries(months).map(([key, val]) => {
          const span = val.end - val.start + 1;
          const mLabel = monthNames[key.slice(5, 7)] || key.slice(5, 7);
          return `<div style="flex:${span};text-align:center;font-size:8px;color:var(--text-sec);border-top:1px solid var(--border);padding-top:2px;font-weight:600;">${mLabel}</div>`;
        }).join('')}
      </div>`;
    }

    // Cumulative deficit for kg milestones
    let cumDeficit = 0;
    const kgMilestones = deficitData.map(dd => {
      if (!dd.hasData) return null;
      const prevCum = cumDeficit;
      cumDeficit += dd.totalDeficit; // positive = deficit, negative = surplus
      const prevKg = Math.floor(prevCum / 7700);
      const nowKg = Math.floor(cumDeficit / 7700);
      return nowKg > prevKg ? nowKg : null; // returns kg number if milestone crossed
    });

    const chartBars = days.map((d, idx) => {
      if (!d.hasData) {
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'20':'36'}px;">
          <div style="height:120px;display:flex;align-items:flex-end;width:100%;justify-content:center;">
            <div style="width:${isMonthView?'12':'20'}px;height:2px;background:var(--border);border-radius:2px;"></div>
          </div>
          ${dayLabel(d, idx)}
        </div>`;
      }

      if (informeChartMode === 'deficit') {
        const dd = deficitData[idx];
        const isDeficit = dd.totalDeficit > 0;
        const absVal = Math.abs(dd.totalDeficit);
        const sign = isDeficit ? '-' : '+';
        const numColor = isDeficit ? 'var(--green)' : 'var(--red)';
        const bw = isMonthView ? '14' : '24';

        let barContent;
        if (isDeficit) {
          // Deficit = good = bars grow UP from zero line
          const totalH = totalRange > 0 ? (dd.totalDeficit / totalRange) * 120 : 0;
          const stepsH = dd.stepsKcal > 0 && dd.totalDeficit > 0 ? (dd.stepsKcal / dd.totalDeficit) * totalH : 0;
          const gymH = dd.gymKcal > 0 && dd.totalDeficit > 0 ? (dd.gymKcal / dd.totalDeficit) * totalH : 0;
          const baseH = Math.max(totalH - stepsH - gymH, 2);
          barContent = `
            <div style="height:${zeroFromTop}px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;">
              ${gymH > 0 ? `<div style="width:${bw}px;height:${gymH}px;background:#10b981;border-radius:4px 4px 0 0;opacity:0.85;" title="Gym ${dd.gymKcal} kcal"></div>` : ''}
              ${stepsH > 0 ? `<div style="width:${bw}px;height:${stepsH}px;background:#F59E0B;opacity:0.85;" title="Pasos ${dd.stepsKcal} kcal"></div>` : ''}
              <div style="width:${bw}px;height:${Math.max(baseH, 2)}px;background:var(--teal);border-radius:0 0 2px 2px;opacity:0.85;" title="Dieta ${Math.round(dd.baseDeficit)} kcal"></div>
            </div>
            <div style="height:${120 - zeroFromTop}px;"></div>`;
        } else {
          // Surplus = bad = bar grows DOWN from zero line
          const surplusH = totalRange > 0 ? (absVal / totalRange) * 120 : 0;
          barContent = `
            <div style="height:${zeroFromTop}px;"></div>
            <div style="height:${120 - zeroFromTop}px;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;">
              <div style="width:${bw}px;height:${Math.max(surplusH, 2)}px;background:var(--red);border-radius:0 0 4px 4px;opacity:0.85;" title="Superávit ${Math.round(absVal)} kcal"></div>
            </div>`;
        }

        const milestone = kgMilestones[idx];

        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'20':'36'}px;position:relative;">
          <div style="font-size:${isMonthView?'8':'10'}px;color:${numColor};font-weight:600;">${sign}${Math.round(absVal)}</div>
          <div style="height:120px;position:relative;width:100%;">
            <div style="position:absolute;top:${zeroFromTop}px;left:0;right:0;height:1px;background:var(--text-sec);opacity:0.3;"></div>
            <div style="height:120px;display:flex;flex-direction:column;align-items:center;">
              ${barContent}
            </div>
          </div>
          ${dayLabel(d, idx)}
          ${milestone ? `<div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:#8B5CF6;white-space:nowrap;">-${milestone}kg</div>` : ''}
        </div>`;
      }

      // Intake mode (default)
      const h = Math.max((d.totals.kcal / maxKcal) * 120, 4);
      const ratio = d.totals.kcal / tgt.kcal;
      const color = ratio <= 1.1 ? 'var(--teal)' : ratio <= 1.2 ? 'var(--yellow)' : 'var(--red)';
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'20':'36'}px;">
        <div style="font-size:${isMonthView?'8':'10'}px;color:var(--text-sec);font-weight:500;">${Math.round(d.totals.kcal)}</div>
        <div style="height:120px;display:flex;align-items:flex-end;width:100%;justify-content:center;">
          <div style="width:${isMonthView?'14':'24'}px;height:${h}px;background:${color};border-radius:4px 4px 2px 2px;opacity:0.85;"></div>
        </div>
        ${dayLabel(d, idx)}
      </div>`;
    }).join('');

    // Combined view: intake bar + stacked deficit bar side by side
    const maxCombined = Math.max(maxKcal, ...deficitData.map((d, i) => getTDEE(days[i].date) + (d.stepsKcal||0) + (d.gymKcal||0)));
    const combinedBars = days.map((d, idx) => {
      if (!d.hasData) {
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'24':'44'}px;">
          <div style="height:120px;display:flex;align-items:flex-end;width:100%;justify-content:center;">
            <div style="width:30px;height:2px;background:var(--border);border-radius:2px;"></div>
          </div>
          ${dayLabel(d, idx)}
        </div>`;
      }
      const dd = deficitData[idx];
      const bw = isMonthView ? 8 : 14;
      const intakeH = Math.max((d.totals.kcal / maxCombined) * 120, 4);
      const ratio = d.totals.kcal / tgt.kcal;
      const intakeColor = ratio <= 1.1 ? 'var(--teal)' : ratio <= 1.2 ? 'var(--yellow)' : 'var(--red)';
      const isDeficit = dd.totalDeficit > 0;
      const absDeficit = Math.abs(dd.totalDeficit);

      if (!isDeficit) {
        // Surplus: only intake bar, red +XX above
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${isMonthView?'24':'44'}px;">
          <div style="display:flex;gap:1px;font-size:${isMonthView?'7':'9'}px;">
