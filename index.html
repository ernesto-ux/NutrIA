  window.exportInformeCSV = function() {
    const dates = getInformeDates();
    const allMeals = getAllMeals();
    const userName = USERS[currentUser].name;
    const rows = [['Fecha','Dia','Comida','Alimento','Gramos','Kcal','Proteina','Carbs','Grasa']];
    const dayNames = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];

    dates.forEach(date => {
      const dayMeals = allMeals.filter(m => m.date === date);
      const d = parseDate(date);
      const dayName = dayNames[d.getDay()];
      dayMeals.forEach(m => {
        (m.items || []).forEach(item => {
          rows.push([
            date, dayName, m.meal || '',
            (item.name || item.foodId || '').replace(/,/g, ';'),
            round1(item.grams || 0),
            round1(item.kcal || 0),
            round1(item.prot || 0),
            round1(item.carbs || 0),
            round1(item.fat || 0)
          ]);
        });
      });
    });

    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `NutrIA_${userName}_${dates[0]}_${dates[dates.length-1]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV descargado');
  };

  window.exportInformePDF = function() {
    const statusEl = document.getElementById('pdf-status');
    if (statusEl) statusEl.textContent = 'Generando...';

    const dates = getInformeDates();
    const dayNames = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    const tgt = TARGETS();

    const days = dates.map(date => {
      const totals = getDayTotals(date);
      const activity = getActivityForDate(date);
      const balance = getBalanceForDate(date);
      const d = parseDate(date);
      return { date, totals, activity, balance, dayName: dayNames[d.getDay()],
        dayLabel: d.toLocaleDateString('es-ES',{day:'numeric',month:'short'}),
        hasData: totals.kcal > 0 };
    });

    const daysWithData = days.filter(d => d.hasData);
    const totalIntake = daysWithData.reduce((s,d) => s + d.totals.kcal, 0);
    const avgIntake = daysWithData.length > 0 ? totalIntake / daysWithData.length : 0;
    const avgProt = daysWithData.length > 0 ? daysWithData.reduce((s,d) => s + d.totals.prot, 0) / daysWithData.length : 0;
    const avgCarbs = daysWithData.length > 0 ? daysWithData.reduce((s,d) => s + d.totals.carbs, 0) / daysWithData.length : 0;
    const avgFat = daysWithData.length > 0 ? daysWithData.reduce((s,d) => s + d.totals.fat, 0) / daysWithData.length : 0;

    let totalGym = 0, totalStepsKcal = 0, totalSteps = 0, gymSessions = 0;
    days.forEach(d => {
      if (d.activity) {
        totalGym += d.activity.gymKcal || 0;
        totalStepsKcal += d.activity.stepsKcal || 0;
        totalSteps += d.activity.steps || 0;
        if (d.activity.gymKcal > 0) gymSessions++;
      }
    });

    const totalTDEE = daysWithData.reduce((s, d) => s + getTDEE(d.date), 0);
    const totalBurn = totalTDEE + totalGym + totalStepsKcal;
    const totalDeficit = totalIntake - totalBurn;
    const fatLost = Math.abs(totalDeficit) / 7700;

    // Build bar chart as SVG
    const maxKcal = Math.max(...days.map(d => d.totals.kcal), tgt.kcal * 1.3);
    const barW = 60, barGap = 8, chartPadL = 40, chartPadB = 30, chartH = 160;
    const svgW = chartPadL + days.length * (barW + barGap);
    const targetY = chartH - (tgt.kcal / maxKcal) * (chartH - chartPadB - 10) - chartPadB;
    let svgBars = '';
    days.forEach((d, i) => {
      const x = chartPadL + i * (barW + barGap);
      const val = d.totals.kcal;
      const h = val > 0 ? Math.max((val / maxKcal) * (chartH - chartPadB - 10), 3) : 0;
      const y = chartH - chartPadB - h;
      const ratio = val / tgt.kcal;
      const color = !d.hasData ? '#E2E8F0' : ratio <= 1.1 ? '#0D9488' : ratio <= 1.2 ? '#F59E0B' : '#EF4444';
      const gym = d.activity && d.activity.gymKcal > 0;
      svgBars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" rx="4" opacity="0.85"/>`;
      svgBars += `<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B" font-family="Inter,sans-serif">${val > 0 ? Math.round(val) : ''}</text>`;
      svgBars += `<text x="${x+barW/2}" y="${chartH-8}" text-anchor="middle" font-size="10" font-weight="${gym?'700':'400'}" fill="#64748B" font-family="Inter,sans-serif">${d.dayName}${gym?' \u{1F3CB}':''}</text>`;
    });
    const chartSvg = `<svg width="${svgW}" height="${chartH}" viewBox="0 0 ${svgW} ${chartH}" xmlns="http://www.w3.org/2000/svg">
      ${svgBars}
      <line x1="${chartPadL-4}" y1="${targetY}" x2="${svgW}" y2="${targetY}" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="${svgW-4}" y="${targetY-4}" text-anchor="end" font-size="9" fill="#0D9488" font-weight="600" font-family="Inter,sans-serif">obj ${tgt.kcal}</text>
    </svg>`;

    // Build balance table rows
    let balanceRows = '';
    let wkIntake=0, wkTDEE=0, wkSteps=0, wkGym=0, wkBal=0;
    days.forEach(d => {
      const intake = d.hasData ? Math.round(d.totals.kcal) : '-';
      const gym = d.activity && d.activity.gymKcal > 0 ? d.activity.gymKcal : '-';
      const steps = d.activity ? d.activity.stepsKcal : '-';
      const pdfTDEE = getTDEE(d.date);
      const bal = d.balance ? d.balance.balance : (d.hasData ? Math.round(d.totals.kcal - pdfTDEE - (d.activity?d.activity.gymKcal||0:0) - (d.activity?d.activity.stepsKcal||0:0)) : '-');
      const balNum = typeof bal === 'number' ? bal : 0;
      const balColor = balNum < -1000 ? '#059669' : balNum < 0 ? '#0D9488' : balNum > 0 ? '#EF4444' : '#64748B';
      const bgColor = (d.dayName==='Sab'||d.dayName==='Dom') ? '#F0FDFA' : (balNum < -1500 ? '#ECFDF5' : '#fff');
      if (d.hasData) { wkIntake += d.totals.kcal; wkTDEE += pdfTDEE; wkSteps += (d.activity?d.activity.stepsKcal||0:0); wkGym += (d.activity?d.activity.gymKcal||0:0); wkBal += balNum; }
      balanceRows += `<tr style="background:${bgColor}">
        <td style="font-weight:700;text-align:left;">${d.dayName}</td>
        <td style="text-align:left;color:#64748B;">${d.dayLabel}</td>
        <td style="font-weight:500;">${intake}</td>
        <td style="color:#64748B;">${pdfTDEE.toLocaleString()}</td>
        <td style="color:#F59E0B;font-weight:500;">${steps}</td>
        <td style="color:#0D9488;font-weight:${gym!=='-'?'700':'400'};">${gym}</td>
        <td style="color:${balColor};font-weight:700;">${typeof bal==='number'?(bal>0?'+':'')+bal:'-'}</td>
      </tr>`;
    });
    balanceRows += `<tr style="background:#0D9488;color:#fff;">
      <td colspan="2" style="font-weight:700;text-align:left;color:#fff;">TOTAL</td>
      <td style="font-weight:700;color:#fff;">${Math.round(wkIntake).toLocaleString()}</td>
      <td style="color:rgba(255,255,255,0.8);">${Math.round(wkTDEE).toLocaleString()}</td>
      <td style="color:rgba(255,255,255,0.8);">${wkSteps}</td>
      <td style="color:rgba(255,255,255,0.8);">${wkGym.toLocaleString()}</td>
      <td style="font-weight:700;color:#fff;">${Math.round(wkBal).toLocaleString()}</td>
    </tr>`;

    // Macros bars
    const macros = [
      {name:'Calorias', emoji:'\u{1F525}', avg:avgIntake, target:tgt.kcal, unit:'kcal'},
      {name:'Proteina', emoji:'\u{1F4AA}', avg:avgProt, target:tgt.prot, unit:'g'},
      {name:'Carbs', emoji:'\u{1F33E}', avg:avgCarbs, target:tgt.carbs, unit:'g'},
      {name:'Grasa', emoji:'\u{1F9C8}', avg:avgFat, target:tgt.fat, unit:'g'},
    ];
    let macroHtml = '';
    macros.forEach(m => {
      const pct = m.target > 0 ? Math.round(m.avg / m.target * 100) : 0;
      const barPct = Math.min(pct, 140);
      const color = pct >= 90 && pct <= 110 ? '#059669' : pct > 120 ? '#EF4444' : '#F59E0B';
      macroHtml += `<div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <span style="font-size:13px;font-weight:600;">${m.emoji} ${m.name}</span>
          <span style="font-size:12px;color:#64748B;">${round1(m.avg)} / ${m.target} ${m.unit} <b style="color:${color};">(${pct}%)</b></span>
        </div>
        <div style="background:#E2E8F0;border-radius:6px;height:10px;overflow:hidden;">
          <div style="background:${color};height:100%;width:${barPct}%;border-radius:6px;"></div>
        </div>
      </div>`;
    });

    // Projection
    const weeklyDeficit = Math.abs(totalDeficit) / days.length * 7;
    const weeklyFatLoss = weeklyDeficit / 7700;
    const currentWeight = 89 - fatLost;
    const kgToLose = currentWeight - 75;
    const weeksToGoal = weeklyFatLoss > 0 ? Math.ceil(kgToLose / weeklyFatLoss) : 999;
    const goalDate = new Date(); goalDate.setDate(goalDate.getDate() + weeksToGoal * 7);
    const goalLabel = goalDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

    const rangeLabel = informeRange === 'dia' ? `Dia ${dates[0]}` : informeRange === 'semana' ? `Semana ${dates[0].slice(8)}-${dates[dates.length-1].slice(8)} ${dates[0].slice(5,7)}` : informeRange === 'mes' ? 'Este mes' : `${dates[0]} a ${dates[dates.length-1]}`;

    // Deficit chart SVG for PDF
    const deficitDataPdf = days.map(d => {
      if (!d.hasData) return { ...d, totalDeficit: 0, stepsKcal: 0, gymKcal: 0, baseDeficit: 0 };
      const TDEE_PDF = getTDEE(d.date);
      const stepsK = d.activity ? d.activity.stepsKcal || 0 : 0;
      const gymK = d.activity ? d.activity.gymKcal || 0 : 0;
      const baseDeficit = TDEE_PDF - d.totals.kcal;
      const totalDef = baseDeficit + stepsK + gymK;
      return { ...d, totalDeficit: totalDef, stepsKcal: stepsK, gymKcal: gymK, baseDeficit };
    });
    const maxDefUp = Math.max(...deficitDataPdf.filter(d => d.hasData && d.totalDeficit > 0).map(d => d.totalDeficit), 1);
    const maxSurDown = Math.max(...deficitDataPdf.filter(d => d.hasData && d.totalDeficit < 0).map(d => Math.abs(d.totalDeficit)), 0);
    const totRange = maxDefUp + maxSurDown || 1;
    const zeroY = Math.round((maxDefUp / totRange) * 120);

    const defBarW = Math.min(50, Math.max(20, Math.floor(500 / days.length) - 6));
    const defGap = 4;
    const defSvgW = 40 + days.length * (defBarW + defGap);
    let defBars = '';
    let cumDef = 0;
    days.forEach((dd, i) => {
      const d = deficitDataPdf[i];
      const x = 40 + i * (defBarW + defGap);
      const cx = x + defBarW / 2;
      if (!d.hasData) {
        defBars += `<rect x="${x}" y="${zeroY - 1}" width="${defBarW}" height="2" fill="#E2E8F0" rx="1"/>`;
      } else if (d.totalDeficit > 0) {
        const h = (d.totalDeficit / totRange) * 120;
        const gymH = d.gymKcal > 0 ? (d.gymKcal / d.totalDeficit) * h : 0;
        const stepsH = d.stepsKcal > 0 ? (d.stepsKcal / d.totalDeficit) * h : 0;
        const baseH = Math.max(h - gymH - stepsH, 1);
        let cy = zeroY;
        if (gymH > 0) { defBars += `<rect x="${x}" y="${cy - gymH}" width="${defBarW}" height="${gymH}" fill="#10b981" rx="2" opacity="0.85"/>`; cy -= gymH; }
        if (stepsH > 0) { defBars += `<rect x="${x}" y="${cy - stepsH}" width="${defBarW}" height="${stepsH}" fill="#F59E0B" rx="0" opacity="0.85"/>`; cy -= stepsH; }
        defBars += `<rect x="${x}" y="${cy - baseH}" width="${defBarW}" height="${baseH}" fill="#0D9488" rx="0" opacity="0.85"/>`;
        defBars += `<text x="${cx}" y="${cy - baseH - 3}" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">-${Math.round(d.totalDeficit)}</text>`;
      } else {
        const h = (Math.abs(d.totalDeficit) / totRange) * 120;
        defBars += `<rect x="${x}" y="${zeroY}" width="${defBarW}" height="${Math.max(h, 2)}" fill="#EF4444" rx="2" opacity="0.85"/>`;
        defBars += `<text x="${cx}" y="${zeroY + Math.max(h, 2) + 10}" text-anchor="middle" font-size="8" font-weight="600" fill="#EF4444">+${Math.round(Math.abs(d.totalDeficit))}</text>`;
      }
      // kg milestones
      const prevCum = cumDef;
      if (d.hasData) cumDef += d.totalDeficit;
      if (Math.floor(cumDef / 7700) > Math.floor(prevCum / 7700)) {
        const kgN = Math.floor(cumDef / 7700);
        defBars += `<rect x="${x - 2}" y="${zeroY - 2}" width="${defBarW + 4}" height="3" fill="#8B5CF6" rx="1"/>`;
        defBars += `<text x="${cx}" y="${zeroY + 22}" text-anchor="middle" font-size="7" font-weight="700" fill="#8B5CF6">-${kgN}kg</text>`;
      }
      // day label
      defBars += `<text x="${cx}" y="${140}" text-anchor="middle" font-size="8" fill="#64748B">${dd.dayName}</text>`;
    });
    // zero line
    defBars += `<line x1="36" y1="${zeroY}" x2="${defSvgW}" y2="${zeroY}" stroke="#94A3B8" stroke-width="0.5"/>`;
    const defChartSvg = `<svg width="${defSvgW}" height="150" viewBox="0 0 ${defSvgW} 150" xmlns="http://www.w3.org/2000/svg">${defBars}</svg>`;

    // Daily detail table (each meal per day)
    let dailyDetailHtml = '';
    daysWithData.forEach(d => {
      const mealsForDay = MEAL_LOG.filter(m => m.date === d.date && (!m.who || m.who === currentUser));
      if (mealsForDay.length === 0) return;
      let dayRows = '';
      mealsForDay.forEach(meal => {
        meal.items.forEach((item, idx) => {
          dayRows += `<tr>
            ${idx === 0 ? `<td rowspan="${meal.items.length}" style="font-weight:600;text-transform:capitalize;vertical-align:top;text-align:left;font-size:10px;">${meal.meal}</td>` : ''}
            <td style="text-align:left;font-size:10px;">${item.name}</td>
            <td style="font-size:10px;">${item.grams}g</td>
            <td style="font-size:10px;">${Math.round(item.kcal)}</td>
            <td style="font-size:10px;">${round1(item.prot)}</td>
            <td style="font-size:10px;">${round1(item.carbs)}</td>
            <td style="font-size:10px;">${round1(item.fat)}</td>
          </tr>`;
        });
      });
      const stepsK = d.activity ? d.activity.stepsKcal || 0 : 0;
      const gymK = d.activity ? d.activity.gymKcal || 0 : 0;
      const bal = Math.round(d.totals.kcal - getTDEE(d.date) - stepsK - gymK);
      const balColor = bal < 0 ? '#059669' : '#EF4444';
      dailyDetailHtml += `
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;background:#F1F5F9;padding:6px 10px;border-radius:6px 6px 0 0;">
            <span style="font-weight:700;font-size:11px;">${d.dayName} ${d.dayLabel}</span>
            <span style="font-size:10px;">${Math.round(d.totals.kcal)} kcal | ${round1(d.totals.prot)}P | <span style="color:${balColor};font-weight:700;">${bal > 0 ? '+' : ''}${bal}</span></span>
          </div>
          <table style="font-size:10px;">
            <thead><tr><th style="text-align:left;width:60px;">Comida</th><th style="text-align:left;">Item</th><th>g</th><th>kcal</th><th>P</th><th>C</th><th>F</th></tr></thead>
            <tbody>${dayRows}</tbody>
          </table>
        </div>`;
    });

    // Weight storyline for PDF
    let weightSection = '';
    if (typeof WEIGHT_LOG !== 'undefined' && WEIGHT_LOG.length >= 2) {
      const wSorted = [...WEIGHT_LOG].sort((a, b) => a.date.localeCompare(b.date));
      const wFirst = wSorted[0], wLast = wSorted[wSorted.length - 1];
      const ws = wSorted.map(w => w.weight);
      const wMin = Math.min(...ws, 75) - 2, wMax = Math.max(...ws) + 2, wRange = wMax - wMin || 1;
      const wChartW = 400, wChartH = 100;
      const wLine = wSorted.map((w, i) => {
        const x = 30 + (i / Math.max(wSorted.length - 1, 1)) * (wChartW - 40);
        const y = 8 + ((wMax - w.weight) / wRange) * (wChartH - 16);
        return `${x},${y}`;
      }).join(' ');
      const goalYw = 8 + ((wMax - 75) / wRange) * (wChartH - 16);
      let wYLabels = '';
      for (let v = Math.floor(wMin / 2) * 2; v <= Math.ceil(wMax / 2) * 2; v += 2) {
        const y = 8 + ((wMax - v) / wRange) * (wChartH - 16);
        if (y >= 2 && y <= wChartH - 2) {
          wYLabels += `<text x="26" y="${y + 3}" text-anchor="end" font-size="8" fill="#94A3B8">${v}</text>`;
          wYLabels += `<line x1="30" y1="${y}" x2="${wChartW}" y2="${y}" stroke="#E2E8F0" stroke-width="0.5"/>`;
        }
      }
      const wDots = wSorted.map((w, i) => {
        const x = 30 + (i / Math.max(wSorted.length - 1, 1)) * (wChartW - 40);
        const y = 8 + ((wMax - w.weight) / wRange) * (wChartH - 16);
        return `<circle cx="${x}" cy="${y}" r="3" fill="#0D9488" stroke="#fff" stroke-width="1"/>
          <text x="${x}" y="${y - 6}" text-anchor="middle" font-size="7" fill="#1E293B" font-weight="600">${w.weight}</text>`;
      }).join('');
      const wXLabels = wSorted.map((w, i) => {
        const x = 30 + (i / Math.max(wSorted.length - 1, 1)) * (wChartW - 40);
        return `<text x="${x}" y="${wChartH + 10}" text-anchor="middle" font-size="7" fill="#94A3B8">S${i + 1}</text>`;
      }).join('');
      weightSection = `
        <div class="section">
          <div class="section-title">\u2696\uFE0F Evolucion de Peso</div>
          <div style="display:flex;gap:16px;margin-bottom:10px;">
            <div style="text-align:center;flex:1;background:#F0FDFA;border-radius:8px;padding:8px;">
              <div style="font-size:18px;font-weight:700;color:#0D9488;">${wFirst.weight} \u2192 ${wLast.weight} kg</div>
              <div style="font-size:9px;color:#64748B;">${(wLast.weight - wFirst.weight).toFixed(1)} kg en ${wSorted.length} semanas</div>
            </div>
          </div>
          <svg width="${wChartW}" height="${wChartH + 16}" viewBox="0 0 ${wChartW} ${wChartH + 16}" style="width:100%;max-width:${wChartW}px;">
            ${wYLabels}
            <line x1="30" y1="${goalYw}" x2="${wChartW}" y2="${goalYw}" stroke="#059669" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
            <text x="${wChartW - 2}" y="${goalYw - 3}" text-anchor="end" font-size="8" fill="#059669">75 kg meta</text>
            <polyline points="${wLine}" fill="none" stroke="#0D9488" stroke-width="2" stroke-linejoin="round"/>
            ${wDots}
            ${wXLabels}
          </svg>
        </div>`;
    }

    const printWin = window.open('', '_blank');
    printWin.document.write(`<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>NutrIA - ${USERS[currentUser].name} - ${dates[0]} a ${dates[dates.length-1]}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; color: #1E293B; background: #fff; padding: 16px 20px; font-size: 11px; }
  .header { text-align: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 3px solid #0D9488; }
  .header .tag { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #0F766E; font-weight: 700; margin-bottom: 2px; }
  .header .sub { font-size: 10px; color: #64748B; margin-top: 2px; }
  .section { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .section-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #1E293B; }
  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .kpi { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 6px; padding: 6px 3px; text-align: center; }
  .kpi-emoji { font-size: 14px; }
  .kpi-value { font-size: 12px; font-weight: 700; line-height: 1.2; margin: 1px 0; }
  .kpi-label { font-size: 7px; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #F1F5F9; color: #64748B; font-size: 7px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; padding: 4px 4px; text-align: center; }
  td { padding: 3px 4px; border-bottom: 1px solid #F1F5F9; text-align: center; font-size: 10px; }
  .chart-container { text-align: center; overflow-x: auto; }
  .chart-container svg { max-width: 100%; height: auto; }
  .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .proj-box { border-radius: 8px; padding: 12px; text-align: center; }
  .footer { text-align: center; font-size: 7px; color: #94A3B8; margin-top: 14px; padding-top: 6px; border-top: 1px solid #E2E8F0; }
  @media print {
    body { padding: 8px 12px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .section { break-inside: avoid; page-break-inside: avoid; }
    .page-break { page-break-before: always; }
  }
</style>
</head><body>

<div class="header">
  <img src="${NUTRIA_LOGO_B64}" style="height:40px;margin-bottom:2px;">
  <div class="tag">INFORME NUTRICIONAL</div>
  <div class="sub">${rangeLabel} | ${USERS[currentUser].name} | ${daysWithData.length} dias con datos</div>
</div>

<div class="section">
  <div class="section-title">\u{1F3AF} Resumen</div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-emoji">\u{1F525}</div><div class="kpi-value" style="color:#059669;">${Math.abs(Math.round(totalDeficit)).toLocaleString()}</div><div class="kpi-label">Deficit (kcal)</div></div>
    <div class="kpi"><div class="kpi-emoji">\u2696\uFE0F</div><div class="kpi-value" style="color:#0D9488;">${fatLost.toFixed(2)} kg</div><div class="kpi-label">Grasa Perdida</div></div>
    <div class="kpi"><div class="kpi-emoji">\u{1F4CA}</div><div class="kpi-value">${Math.round(avgIntake)}</div><div class="kpi-label">Prom kcal/dia</div></div>
    <div class="kpi"><div class="kpi-emoji">\u{1F3CB}\uFE0F</div><div class="kpi-value" style="color:#10b981;">${gymSessions}x</div><div class="kpi-label">Gym (${totalGym} kcal)</div></div>
    <div class="kpi"><div class="kpi-emoji">\u{1F6B6}</div><div class="kpi-value">${Math.round(totalSteps/1000)}k</div><div class="kpi-label">Pasos (${totalStepsKcal} kcal)</div></div>
    <div class="kpi"><div class="kpi-emoji">\u{1F4C5}</div><div class="kpi-value">${daysWithData.length}/${days.length}</div><div class="kpi-label">Dias Reg.</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">\u{1F4C9} Deficit Diario</div>
  <div style="display:flex;gap:8px;margin-bottom:6px;font-size:8px;">
    <span style="color:#0D9488;">\u25A0 Dieta</span>
    <span style="color:#F59E0B;">\u25A0 Pasos</span>
    <span style="color:#10b981;">\u25A0 Gym</span>
    <span style="color:#EF4444;">\u25A0 Superavit</span>
  </div>
  <div class="chart-container">${defChartSvg}</div>
</div>

<div class="section">
  <div class="section-title">\u{1F4C8} Calorias Diarias</div>
  <div class="chart-container">${chartSvg}</div>
</div>

<div class="section">
  <div class="section-title">\u26A1 Balance Energetico</div>
  <table>
    <thead><tr><th style="text-align:left;">Dia</th><th style="text-align:left;">Fecha</th><th>Ingesta</th><th>TDEE</th><th>Pasos</th><th>Gym</th><th>Balance</th></tr></thead>
    <tbody>${balanceRows}</tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">\u{1F957} Macros Promedio</div>
  ${macroHtml}
</div>

${weightSection}

<div class="section">
  <div class="section-title">\u{1F3AF} Proyeccion</div>
  <div class="proj-grid">
    <div class="proj-box" style="background:#CCFBF1;">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#0D9488;font-weight:700;margin-bottom:3px;">Peso Actual</div>

  window.saveFoodDB = function (foodId) {

    const brand = document.getElementById('dbe-brand').value.trim();
    const kcal = parseFloat(document.getElementById('dbe-kcal').value) || 0;
    const prot = parseFloat(document.getElementById('dbe-prot').value) || 0;

    const fat = parseFloat(document.getElementById('dbe-fat').value) || 0;
    const original = FOOD_DATABASE.find(x => x.id === foodId);
    const payload = {
      id: foodId,
      name: name || original.name,
      brand: brand || original.brand || 'Recetario',
      per100g: { kcal, prot, carbs, fat, fiber: 0 },
      totalG: original.totalG || 0,
      source: 'verified',
      author: original.author || '',
      addedDate: original.addedDate || new Date().toISOString().slice(0, 10)
    };
    fetch('/api/edit-food', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(r => r.json()).then(res => {
      if (res.ok) {
        // Update in-memory
        const idx = FOOD_DATABASE.findIndex(x => x.id === foodId);
        if (idx >= 0) {
          FOOD_DATABASE[idx] = { ...FOOD_DATABASE[idx], ...payload };
        }
        // Clear any localStorage override
        const overrides = getFoodOverrides();
        delete overrides[foodId];
        saveFoodOverrides(overrides);
        showToast('Guardado: ' + (name || foodId));
        render();
      } else {
        showToast('Error al guardar');
      }
    }).catch(() => {
      // Fallback: save to localStorage overrides
      const overrides = getFoodOverrides();
      overrides[foodId] = { per100g: { kcal, prot, carbs, fat, fiber: 0 }, source: 'verified' };
      saveFoodOverrides(overrides);
      showToast('Guardado localmente: ' + (name || foodId));
      render();
    });

  window.saveUploadDish = function () {
    const name = document.getElementById('upload-name').value.trim();
    const portion = parseFloat(document.getElementById('upload-portion').value);
    const kcal = parseFloat(document.getElementById('upload-kcal').value) || 0;
    const prot = parseFloat(document.getElementById('upload-prot').value) || 0;
    const carbs = parseFloat(document.getElementById('upload-carbs').value) || 0;
    const fat = parseFloat(document.getElementById('upload-fat').value) || 0;
    const author = document.getElementById('upload-author').value;

    if (!name) { alert('Ingresa el nombre del plato.'); return; }
    if (!portion || portion <= 0) { alert('Ingresa los gramos de la porcion.'); return; }

    // Convert from per-portion to per-100g
    const per100g = {
      kcal: round1(kcal / portion * 100),
      prot: round1(prot / portion * 100),
      carbs: round1(carbs / portion * 100),
      fat: round1(fat / portion * 100),
      fiber: 0
    };

    const id = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

    if (FOOD_DATABASE.find(f => f.id === id)) {
      alert('Ya existe un alimento con ID "' + id + '". Usa otro nombre.');
      return;
    }

    const newFood = {
      id,
      name,
      brand: author,
      per100g,
      totalG: portion,
      source: 'manual',
      author: author,
      addedDate: getTodayStr()
    };

    FOOD_DATABASE.unshift(newFood);

    fetch('/api/add-food', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newFood)
    }).catch(() => {});

    closeUploadDish();
    showToast('🍽️ "' + name + '" subido por ' + author + ' (' + portion + 'g)');
    render();
  };

  window.editFoodGrams = function (entryId, itemIdx, source, currentGrams, foodName) {
    const newGrams = prompt('Gramos de "' + foodName + '":', currentGrams);
    if (newGrams === null || isNaN(newGrams) || parseFloat(newGrams) <= 0) return;
    const g = parseFloat(newGrams);

    function recalcItem(item) {
      const food = FOOD_DATABASE.find(f => f.id === item.foodId);
      const oldGrams = item.grams || g;
      item.grams = g;
      if (food) {
        const fd = getFoodData(food);
        item.kcal = round1(g / 100 * fd.per100g.kcal);
        item.prot = round1(g / 100 * fd.per100g.prot);
        item.carbs = round1(g / 100 * fd.per100g.carbs);
        item.fat = round1(g / 100 * fd.per100g.fat);
      } else if (oldGrams > 0) {
        // Food deleted: scale macros proportionally from stored values
        const ratio = g / oldGrams;
        item.kcal = round1((item.kcal || 0) * ratio);
        item.prot = round1((item.prot || 0) * ratio);
        item.carbs = round1((item.carbs || 0) * ratio);
        item.fat = round1((item.fat || 0) * ratio);
      }
    }

    const meals = getLocalMeals();
    const entry = meals.find(e => e.id === entryId);
    if (entry && entry.items[itemIdx]) {
      recalcItem(entry.items[itemIdx]);
      saveLocalMeals(meals);
    }
    showToast('✏️ ' + foodName + ' actualizado a ' + g + 'g');
    render();
  };

  window.deleteFoodItem = function (entryId, itemIdx, source) {
    if (!confirm('Eliminar este alimento?')) return;

    const meals = getLocalMeals();
    const entryIndex = meals.findIndex(e => e.id === entryId);
    if (entryIndex >= 0) {
      meals[entryIndex].items.splice(itemIdx, 1);
      if (meals[entryIndex].items.length === 0) {
        meals.splice(entryIndex, 1);
      }
      saveLocalMeals(meals);
    }
    showToast('🗑️ Eliminado');
    render();
  };

  // ── DRAG & DROP: move food item between meal columns ──────────────
  window.moveFoodItem = function (entryId, itemIdx, source, fromMeal, toMeal) {
    if (fromMeal === toMeal) return;

    const meals = getLocalMeals();
    const entry = meals.find(e => e.id === entryId);
    if (!entry || !entry.items[itemIdx]) return;
    const item = entry.items.splice(itemIdx, 1)[0];

    // Find or create a target entry for toMeal on same date
    let target = meals.find(e => e.date === entry.date && e.meal === toMeal);
    if (target) {
      target.items.push(item);
    } else {
      const newId = entry.date + '-L' + Date.now();
      target = { id: newId, date: entry.date, meal: toMeal, items: [item], timestamp: new Date().toISOString(), source: 'local', user: currentUser };
      meals.push(target);
    }

    // Clean up empty source entry
    if (entry.items.length === 0) {
      const idx = meals.indexOf(entry);
      if (idx >= 0) meals.splice(idx, 1);
    }
    saveLocalMeals(meals);
    showToast('↔️ Movido a ' + (MEAL_LABELS[toMeal] || toMeal));
    render();
  };

        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({
          entryId: card.dataset.entryId,
          itemIdx: parseInt(card.dataset.itemIdx),
          source: card.dataset.source,
          meal: card.dataset.meal
        }));
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        cols.forEach(c => c.classList.remove('drag-over'));
      });
    });

    cols.forEach(col => {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', e => {
        if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
      });
      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        try {
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          const toMeal = col.dataset.meal;
          moveFoodItem(data.entryId, data.itemIdx, data.source, data.meal, toMeal);
        } catch (err) { console.error('Drop error:', err); }
      });
    });
  }

  // ── MULTI-SELECT & RECIPE CREATION ────────────────────────────────
  let _selectedCards = new Set(); // stores unique keys: "entryId|itemIdx|source"
  let _wasDragged = false;

  function getCardKey(card) {
    return card.dataset.entryId + '|' + card.dataset.itemIdx + '|' + card.dataset.source;
  }

  function initCardSelection() {
    document.querySelectorAll('.food-card[draggable]').forEach(card => {
      card.addEventListener('dragstart', () => { _wasDragged = true; });
      card.addEventListener('click', e => {
        // Don't toggle selection if dragging or clicking action buttons
        if (_wasDragged) { _wasDragged = false; return; }
        if (e.target.closest('.food-card-actions')) return;
        const key = getCardKey(card);
        if (_selectedCards.has(key)) {
          _selectedCards.delete(key);
          card.classList.remove('selected');
        } else {
          _selectedCards.add(key);
          card.classList.add('selected');
        }
        updateRecipeFab();
      });
    });
    // Restore selection state after re-render
    _selectedCards.forEach(key => {
      const [eid, idx, src] = key.split('|');
      const card = document.querySelector(`.food-card[data-entry-id="${eid}"][data-item-idx="${idx}"][data-source="${src}"]`);
      if (card) card.classList.add('selected');
      else _selectedCards.delete(key); // item no longer exists
    });
    updateRecipeFab();
  }

  function updateRecipeFab() {
    let fab = document.getElementById('recipe-fab');
    if (_selectedCards.size >= 2) {
      if (!fab) {
        fab = document.createElement('button');
        fab.id = 'recipe-fab';
        fab.className = 'recipe-fab';
        document.body.appendChild(fab);
        fab.addEventListener('click', openRecipeModal);
      }
      fab.innerHTML = '\u{1F4D6} Crear receta (' + _selectedCards.size + ')';
    } else {
      if (fab) fab.remove();
    }
  }

  function getSelectedItems() {
    const items = [];
    _selectedCards.forEach(key => {
      const [eid, idx, src] = key.split('|');
      const card = document.querySelector(`.food-card[data-entry-id="${eid}"][data-item-idx="${idx}"][data-source="${src}"]`);
      if (card) {
        items.push({
          name: card.dataset.foodName,
          grams: parseFloat(card.dataset.grams),
          kcal: parseFloat(card.dataset.kcal),
          prot: parseFloat(card.dataset.prot),
          carbs: parseFloat(card.dataset.carbs),
          fat: parseFloat(card.dataset.fat)
        });
      }
    });
    return items;
  }

  function openRecipeModal() {
    const items = getSelectedItems();
    if (items.length < 2) return;

    const totalG = round1(items.reduce((s, i) => s + i.grams, 0));
    const totalKcal = round1(items.reduce((s, i) => s + i.kcal, 0));
    const totalProt = round1(items.reduce((s, i) => s + i.prot, 0));
    const totalCarbs = round1(items.reduce((s, i) => s + i.carbs, 0));
    const totalFat = round1(items.reduce((s, i) => s + i.fat, 0));

    const ingredientList = items.map(i => `<li>${i.name} (${i.grams}g)</li>`).join('');

    const overlay = document.createElement('div');
    overlay.className = 'recipe-modal-overlay';
    overlay.id = 'recipe-modal-overlay';
    overlay.innerHTML = `
      <div class="recipe-modal">
        <h3>Crear receta desde seleccion</h3>
        <div class="recipe-summary">
          <strong>${items.length} ingredientes</strong> . ${totalG}g total
          <ul class="ingredient-list">${ingredientList}</ul>
        </div>
        <div class="recipe-macros">
          <div class="recipe-macro-box"><div class="val">${Math.round(totalKcal)}</div><div class="lbl">kcal</div></div>
          <div class="recipe-macro-box"><div class="val">${totalProt}g</div><div class="lbl">prot</div></div>
          <div class="recipe-macro-box"><div class="val">${totalCarbs}g</div><div class="lbl">carbs</div></div>
          <div class="recipe-macro-box"><div class="val">${totalFat}g</div><div class="lbl">fat</div></div>
        </div>
        <label>Nombre de la receta</label>
        <input type="text" id="recipe-name-input" placeholder="Ej: Bowl de yogurt con frutas" autofocus />
        <div class="recipe-modal-actions">
          <button class="btn-cancel" onclick="closeRecipeModal()">Cancelar</button>
          <button class="btn-create" onclick="confirmCreateRecipe()">Crear</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeRecipeModal(); });
    setTimeout(() => document.getElementById('recipe-name-input').focus(), 50);
  }

  window.closeRecipeModal = function () {
    const overlay = document.getElementById('recipe-modal-overlay');
    if (overlay) overlay.remove();
  };

  window.confirmCreateRecipe = function () {
    const nameInput = document.getElementById('recipe-name-input');
    const name = (nameInput.value || '').trim();
    if (!name) { nameInput.style.borderColor = '#EF4444'; return; }

    const items = getSelectedItems();
    const totalG = round1(items.reduce((s, i) => s + i.grams, 0));
    const totalKcal = items.reduce((s, i) => s + i.kcal, 0);
    const totalProt = items.reduce((s, i) => s + i.prot, 0);
    const totalCarbs = items.reduce((s, i) => s + i.carbs, 0);
    const totalFat = items.reduce((s, i) => s + i.fat, 0);

    // Build per100g
    const per100g = {
      kcal: round1(totalKcal / totalG * 100),
      prot: round1(totalProt / totalG * 100),
      carbs: round1(totalCarbs / totalG * 100),
      fat: round1(totalFat / totalG * 100),
      fiber: 0
    };

    // Generate ID from name
    const id = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

    // Check for duplicates
    if (FOOD_DATABASE.find(f => f.id === id)) {
      alert('Ya existe un alimento con ID "' + id + '". Usa otro nombre.');
      return;
    }

    const newFood = {
      id,
      name,
      brand: 'Recetario',
      per100g,
      totalG,
      source: 'recetario',
      addedDate: getTodayStr(),
      ingredients: items.map(i => ({ name: i.name, grams: i.grams }))
    };

    // Add to runtime database
    FOOD_DATABASE.unshift(newFood);

    // Persist via API
    fetch('/api/add-food', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newFood)
    }).catch(() => {});

    // Clear selection
    _selectedCards.clear();
    closeRecipeModal();
    showToast('\u{1F4D6} Receta "' + name + '" creada (' + totalG + 'g)');
    render();
  };

  function showToast(msg) {
    const existing = document.querySelector('.sync-toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'sync-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
    setTimeout(() => { el.remove(); }, 2500);
  }

  // ── SAVE ALL ──────────────────────────────────────────────────────────
  window.saveAll = async function () {
    const fab = document.getElementById('save-fab');
    fab.className = 'save-fab saving';
    fab.textContent = '...';
    try {
      const data = { meals: getAllLocalMealsRaw(), overrides: getOverrides() };
      const r = await fetch('/api/save-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error('Server error');
      const res = await r.json();
      fab.className = 'save-fab saved';
      fab.textContent = '\u2713';
      showToast('\u2705 Guardado. ' + (res.saved || 0) + ' comidas en disco.');
      setTimeout(() => { fab.className = 'save-fab'; fab.innerHTML = '\uD83D\uDCBE'; }, 2000);
    } catch (e) {
      fab.className = 'save-fab error';
      fab.textContent = '\u2717';
      showToast('\u274C Error al guardar. El servidor esta corriendo?');
      setTimeout(() => { fab.className = 'save-fab'; fab.innerHTML = '\uD83D\uDCBE'; }, 3000);
    }
  };

  // ── INIT ──────────────────────────────────────────────────────────────
  updateUserAvatars();
  loadServerData().then(() => render()).catch(() => render());
})();
</script>
<script>
// Suppress Chrome PWA install prompt (the floating diskette button)
window.addEventListener('beforeinstallprompt', e => e.preventDefault());
</script>
